<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Taxonomy — Phân loại kĩ năng nghề</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════ */
:root {
  --bg:     #f2f2f0;
  --bg2:    #e8e8e5;
  --bg3:    #dcdcd8;
  --sur:    #ffffff;
  --sur2:   #fafaf8;
  --brd:    #d8d8d4;
  --brd2:   #a0a09a;
  --tx1:    #141412;
  --tx2:    #3a3a36;
  --tx3:    #6a6a64;
  --txm:    #8a8a84;
  --acc:    #141412;
  --acc-i:  #f2f2f0;
  --acc-s:  rgba(20,20,18,.06);
  --acc-s2: rgba(20,20,18,.10);
  --grn:    #1a5c2a;
  --grn-bg: #eaf4ec;
  --grn-brd:#b8dfc0;
  --vn-bg:  #f5efe8;
  --vn-c:   #7a4f25;
  --vn-brd: #d4bfa0;
  --sh:     0 1px 3px rgba(0,0,0,.07), 0 4px 12px rgba(0,0,0,.04);
  --shm:    0 2px 8px rgba(0,0,0,.09), 0 8px 20px rgba(0,0,0,.05);
  --r:      3px;
  --tr:     140ms ease;
  --col1:   220px;  /* Sector */
  --col2:   220px;  /* Ngành  */
  --col3:   220px;  /* Vị trí */
  --topH:   48px;
  --statH:  52px;
}
[data-theme=dark] {
  --bg:     #111110;
  --bg2:    #1a1a18;
  --bg3:    #242420;
  --sur:    #1a1a18;
  --sur2:   #1f1f1c;
  --brd:    #2c2c28;
  --brd2:   #504f48;
  --tx1:    #f0f0ec;
  --tx2:    #b8b8b2;
  --tx3:    #888882;
  --txm:    #606058;
  --acc:    #f0f0ec;
  --acc-i:  #111110;
  --acc-s:  rgba(240,240,236,.06);
  --acc-s2: rgba(240,240,236,.10);
  --grn:    #4dab62;
  --grn-bg: #192820;
  --grn-brd:#2a4a30;
  --vn-bg:  #261e14;
  --vn-c:   #d4a070;
  --vn-brd: #4a3820;
  --sh:     0 1px 3px rgba(0,0,0,.3),0 4px 12px rgba(0,0,0,.2);
  --shm:    0 2px 8px rgba(0,0,0,.4),0 8px 20px rgba(0,0,0,.3);
}

/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{font-family:"IBM Plex Sans",sans-serif;background:var(--bg);color:var(--tx1);
  min-height:100vh;transition:background var(--tr),color var(--tr);overflow-x:hidden}
button{cursor:pointer;font-family:inherit;border:none;background:none}

/* ═══════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════ */
.topbar {
  position:fixed;top:0;left:0;right:0;height:var(--topH);
  background:var(--sur);border-bottom:1px solid var(--brd);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;z-index:400;
}
.brand {
  display:flex;align-items:center;gap:10px;
  font-family:"IBM Plex Mono",monospace;font-size:11px;font-weight:500;
  letter-spacing:.08em;text-transform:uppercase;color:var(--tx1);
}
.brand-mark {
  width:24px;height:24px;background:var(--acc);border-radius:2px;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:var(--acc-i);font-weight:700;letter-spacing:0;flex-shrink:0;
}
.top-right{display:flex;align-items:center;gap:6px}
.top-meta{font-family:"IBM Plex Mono",monospace;font-size:9px;color:var(--tx3);letter-spacing:.05em}
.btn-ic{width:28px;height:28px;border:1px solid var(--brd);background:var(--bg2);
  color:var(--tx1);border-radius:var(--r);display:flex;align-items:center;
  justify-content:center;font-size:12px;transition:all var(--tr)}
.btn-ic:hover{background:var(--bg3);border-color:var(--brd2)}

/* ── LOADING OVERLAY ── */
.load-overlay{
  position:fixed;inset:0;background:var(--bg);z-index:500;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity .4s ease;
}
.load-overlay.done{opacity:0;pointer-events:none}
.load-logo{font-family:"IBM Plex Mono",monospace;font-size:13px;letter-spacing:.12em;
  text-transform:uppercase;color:var(--tx1);margin-bottom:8px}
.load-bar-wrap{width:280px;height:2px;background:var(--brd);border-radius:1px;overflow:hidden}
.load-bar{height:100%;background:var(--acc);border-radius:1px;width:0;
  transition:width .25s ease}
.load-status{font-family:"IBM Plex Mono",monospace;font-size:10px;color:var(--tx3);
  letter-spacing:.05em;min-height:16px}

/* ═══════════════════════════════════════════════
   STATS BAR — fixed top-right area
═══════════════════════════════════════════════ */
.stats-bar {
  position:fixed;top:var(--topH);right:0;
  width:calc(100vw - var(--col1) - var(--col2) - var(--col3));
  min-width:300px;
  height:var(--statH);
  background:var(--sur);border-bottom:1px solid var(--brd);
  border-left:1px solid var(--brd);
  display:flex;align-items:stretch;z-index:300;
}
.stat-cell{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:6px 12px;border-right:1px solid var(--brd);gap:2px;
}
.stat-cell:last-child{border-right:none}
.stat-n{
  font-family:"IBM Plex Mono",monospace;font-size:18px;font-weight:500;
  color:var(--tx1);line-height:1;letter-spacing:-.02em;
}
.stat-l{font-size:10px;font-weight:500;color:var(--tx2);letter-spacing:.02em}

/* ═══════════════════════════════════════════════
   SHELL — 4-column layout
═══════════════════════════════════════════════ */
.shell {
  display:flex;
  margin-top:var(--topH);
  min-height:calc(100vh - var(--topH));
}

/* ═══════════════════════════════════════════════
   COLUMN SHARED STYLES
═══════════════════════════════════════════════ */
.col {
  position:fixed;top:var(--topH);bottom:0;
  overflow-y:auto;overflow-x:hidden;
  border-right:1px solid var(--brd);
  background:var(--sur);
  display:flex;flex-direction:column;
}
.col::-webkit-scrollbar{width:2px}
.col::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:1px}

.col-hdr {
  position:sticky;top:0;z-index:10;background:var(--sur);
  padding:10px 12px 8px;border-bottom:1px solid var(--brd);
  flex-shrink:0;
}
.col-title {
  font-family:"IBM Plex Mono",monospace;font-size:8.5px;
  text-transform:uppercase;letter-spacing:.16em;color:var(--tx3);
  margin-bottom:6px;
}
.col-search{
  position:relative;
}
.col-search input{
  width:100%;padding:5px 8px 5px 26px;background:var(--bg2);
  border:1px solid var(--brd);border-radius:var(--r);color:var(--tx1);
  font-family:"IBM Plex Sans",sans-serif;font-size:11.5px;
  outline:none;transition:all var(--tr);
}
.col-search input:focus{border-color:var(--brd2);background:var(--sur)}
.col-search input::placeholder{color:var(--txm)}
.col-search-ico{position:absolute;left:8px;top:50%;transform:translateY(-50%);
  color:var(--txm);font-size:11px;pointer-events:none}

/* ─── COL 1: Sector ─── */
.col-sector{left:0;width:var(--col1)}
.sec-item {
  width:100%;text-align:left;padding:9px 12px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  border-left:3px solid transparent;transition:all var(--tr);
  border-bottom:1px solid var(--brd);
}
.sec-item:hover{background:var(--acc-s)}
.sec-item.active{background:var(--acc-s2);border-left-color:var(--acc)}
.sec-item-inner{flex:1;min-width:0}
.sec-nm{font-size:11.5px;font-weight:600;color:var(--tx1);line-height:1.3;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sec-item.active .sec-nm{color:var(--tx1)}
.sec-sub{font-family:"IBM Plex Mono",monospace;font-size:8px;color:var(--tx3);
  margin-top:2px;letter-spacing:.04em}
.sec-ver{font-family:"IBM Plex Mono",monospace;font-size:8px;padding:1px 4px;
  background:var(--bg2);color:var(--tx3);border:1px solid var(--brd);
  border-radius:2px;flex-shrink:0}
.sec-item.active .sec-ver{background:var(--acc);color:var(--acc-i);border-color:var(--acc)}

/* Loading state per sector */
.sec-loading-row{
  padding:8px 12px;
  font-family:"IBM Plex Mono",monospace;font-size:9px;color:var(--txm);
  display:flex;align-items:center;gap:6px;
}
.spin{animation:spin .7s linear infinite;display:inline-block;font-size:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ─── COL 2: Ngành ─── */
.col-nghe{left:var(--col1);width:var(--col2)}
.col-nghe-empty{
  padding:40px 16px;text-align:center;
  font-size:12px;color:var(--txm);line-height:1.6;
}
.nghe-item{
  width:100%;text-align:left;padding:8px 12px;
  display:flex;align-items:center;justify-content:space-between;gap:6px;
  border-left:3px solid transparent;transition:all var(--tr);
  border-bottom:1px solid var(--brd);
}
.nghe-item:hover{background:var(--acc-s)}
.nghe-item.active{background:var(--acc-s2);border-left-color:var(--acc)}
.nghe-nm{font-size:11.5px;font-weight:500;color:var(--tx2);flex:1;
  line-height:1.3;text-align:left;}
.nghe-item.active .nghe-nm{color:var(--tx1);font-weight:600}
.nghe-cnt{font-family:"IBM Plex Mono",monospace;font-size:8.5px;color:var(--txm);flex-shrink:0}
.nghe-item.active .nghe-cnt{color:var(--tx3)}

/* ─── COL 3: Vị trí ─── */
.col-vt{left:calc(var(--col1) + var(--col2));width:var(--col3)}
.col-vt-empty{
  padding:40px 16px;text-align:center;
  font-size:12px;color:var(--txm);line-height:1.6;
}
.vt-item{
  width:100%;text-align:left;padding:7px 12px 7px 14px;
  display:flex;align-items:center;gap:7px;
  border-left:3px solid transparent;transition:all var(--tr);
  border-bottom:1px solid var(--brd);
}
.vt-item:hover{background:var(--acc-s);color:var(--tx2)}
.vt-item.active{background:var(--acc-s2);border-left-color:var(--acc)}
.vt-dot{width:4px;height:4px;border-radius:50%;background:var(--brd2);flex-shrink:0}
.vt-item.active .vt-dot{background:var(--acc)}
.vt-nm{font-size:11.5px;color:var(--tx2);flex:1;line-height:1.3;text-align:left}
.vt-item.active .vt-nm{color:var(--tx1);font-weight:600}

/* ═══════════════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════════════ */
.main{
  margin-left:calc(var(--col1) + var(--col2) + var(--col3));
  margin-top:calc(var(--statH));
  flex:1;padding:28px 36px;min-width:0;
  min-height:calc(100vh - var(--topH) - var(--statH));
}

/* ── LANDING ── */
.landing{display:block}
.land-title{font-size:28px;font-weight:700;letter-spacing:-.02em;
  color:var(--tx1);margin-bottom:8px;line-height:1.15}
.land-desc{font-size:13px;color:var(--tx2);line-height:1.65;
  max-width:520px;margin-bottom:28px}

.dist-section{margin-top:24px}
.dist-ttl{font-family:"IBM Plex Mono",monospace;font-size:8.5px;
  text-transform:uppercase;letter-spacing:.16em;color:var(--tx3);
  margin-bottom:10px;display:flex;align-items:center;gap:10px}
.dist-ttl::after{content:'';flex:1;height:1px;background:var(--brd)}
.dist-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(188px,1fr));gap:5px}
.dist-item{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);
  padding:9px 12px}
.dist-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px}
.dist-nm{font-size:12px;color:var(--tx2);font-weight:500}
.dist-vl{font-family:"IBM Plex Mono",monospace;font-size:13px;color:var(--tx1);font-weight:600}
.bar-bg{height:2px;background:var(--bg3);border-radius:1px}
.bar-fill{height:2px;background:var(--acc);border-radius:1px}

/* ── POSITION DETAIL ── */
.pos-det{display:none}
.pos-det.active{display:block}
.pos-hdr{margin-bottom:20px;padding-bottom:18px;border-bottom:1px solid var(--brd)}
.pos-bc{font-family:"IBM Plex Mono",monospace;font-size:9px;color:var(--tx3);
  letter-spacing:.06em;margin-bottom:8px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.pos-bc .sep{opacity:.4}
.pos-title{font-size:26px;font-weight:700;letter-spacing:-.02em;
  color:var(--tx1);margin-bottom:12px;line-height:1.15}
.pos-chips{display:flex;flex-wrap:wrap;gap:5px}
.pchip{font-family:"IBM Plex Mono",monospace;font-size:9px;padding:3px 8px;
  border-radius:2px;border:1px solid var(--brd);color:var(--tx2);letter-spacing:.04em}
.pchip.tot{background:var(--acc);color:var(--acc-i);border-color:var(--acc)}
.pchip.vn{background:var(--vn-bg);color:var(--vn-c);border-color:var(--vn-brd)}

/* Filter */
.frow{display:flex;gap:4px;margin-bottom:18px;flex-wrap:wrap}
.ftab{font-family:"IBM Plex Mono",monospace;font-size:9px;letter-spacing:.06em;
  text-transform:uppercase;padding:4px 9px;border-radius:2px;
  border:1px solid var(--brd);color:var(--tx3);transition:all var(--tr)}
.ftab:hover{border-color:var(--brd2);color:var(--tx2)}
.ftab.active{background:var(--acc);color:var(--acc-i);border-color:var(--acc)}
.ftab .cn{opacity:.55;margin-left:2px}

/* Skill groups */
.sk-grp{margin-bottom:22px}
.sg-lbl{font-family:"IBM Plex Mono",monospace;font-size:8px;text-transform:uppercase;
  letter-spacing:.16em;color:var(--tx3);margin-bottom:8px;
  display:flex;align-items:center;gap:8px}
.sg-lbl::after{content:'';flex:1;height:1px;background:var(--brd)}
.sk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:6px}
.sk-card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);
  padding:11px 13px;transition:all var(--tr);position:relative;overflow:hidden}
.sk-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.sk-card.required::before{background:var(--acc)}
.sk-card.preferred::before{background:var(--brd2)}
.sk-card:hover{border-color:var(--brd2);box-shadow:var(--shm)}
.sk-nm{font-size:12.5px;font-weight:600;color:var(--tx1);line-height:1.35;margin-bottom:5px}
.vn-badge{display:inline-block;font-family:"IBM Plex Mono",monospace;font-size:7.5px;
  background:var(--vn-bg);color:var(--vn-c);padding:1px 4px;border-radius:2px;
  margin-left:5px;vertical-align:middle;border:1px solid var(--vn-brd);letter-spacing:.03em}
.sk-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px}
.sk-tag{font-family:"IBM Plex Mono",monospace;font-size:8px;padding:2px 5px;
  border-radius:1px;border:1px solid var(--brd);color:var(--tx3);letter-spacing:.02em}
.sk-tag.req-required{background:var(--acc);color:var(--acc-i);border-color:var(--acc)}
.sk-tag.req-preferred{border-color:var(--brd2);color:var(--tx2)}
.sk-ev{font-size:10.5px;color:var(--tx3);font-style:italic;line-height:1.55;
  border-top:1px solid var(--brd);padding-top:6px;display:none}
.sk-card:hover .sk-ev{display:block}

/* ── SEARCH RESULTS ── */
.sr-view{display:none}
.sr-view.active{display:block}
.sr-hdr{margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--brd)}
.sr-title{font-size:22px;font-weight:700;letter-spacing:-.01em;color:var(--tx1);margin-bottom:4px}
.sr-sub{font-family:"IBM Plex Mono",monospace;font-size:9.5px;color:var(--tx3)}
.sri{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);
  padding:10px 13px;margin-bottom:5px;transition:all var(--tr);border-left:3px solid transparent}
.sri:hover{border-color:var(--brd2);border-left-color:var(--acc)}
.sri-nm{font-size:13px;font-weight:600;color:var(--tx1);margin-bottom:2px}
.sri-en{font-size:10.5px;color:var(--tx3);margin-bottom:6px}
.sri-meta{display:flex;flex-wrap:wrap;gap:3px}
.sri-chip{font-family:"IBM Plex Mono",monospace;font-size:8.5px;padding:2px 6px;
  border-radius:1px;border:1px solid var(--brd);color:var(--tx3)}
.sri-chip.pos{cursor:pointer;transition:all var(--tr)}
.sri-chip.pos:hover{border-color:var(--brd2);color:var(--tx1);background:var(--acc-s)}
.sri-chip.req{background:var(--acc);color:var(--acc-i);border-color:var(--acc)}
.sri-chip.vn{background:var(--vn-bg);color:var(--vn-c);border-color:var(--vn-brd)}

.no-res{text-align:center;padding:80px 20px;color:var(--txm)}
.no-res .ico{font-size:28px;opacity:.2;margin-bottom:10px}
.no-res p{font-size:13px;color:var(--tx3)}

.hidden{display:none !important}
</style>
</head>
<body data-theme="light">

<!-- ── LOADING OVERLAY ── -->
<div class="load-overlay" id="load-overlay">
  <div class="load-logo">Skill Taxonomy</div>
  <div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div>
  <div class="load-status" id="load-status">Đang khởi động...</div>
</div>

<!-- ── TOPBAR ── -->
<header class="topbar">
  <div class="brand">
    <div class="brand-mark">ST</div>
    Skill Taxonomy
  </div>
  <div class="top-right">
    <div class="top-meta" id="top-meta">v1 · 04/03/2026</div>
    <button class="btn-ic" onclick="toggleTheme()" title="Đổi giao diện">
      <span id="theme-ic">◑</span>
    </button>
  </div>
</header>

<!-- ── STATS BAR ── -->
<div class="stats-bar" id="stats-bar">
  <div class="stat-cell"><div class="stat-n" id="st-sectors">—</div><div class="stat-l">Nhóm nghề</div></div>
  <div class="stat-cell"><div class="stat-n" id="st-positions">—</div><div class="stat-l">Vị trí</div></div>
  <div class="stat-cell"><div class="stat-n" id="st-skills">—</div><div class="stat-l">Kĩ năng</div></div>
  <div class="stat-cell"><div class="stat-n" id="st-vn">—</div><div class="stat-l">Đặc thù VN</div></div>
</div>

<div class="shell">
  <!-- COL 1: SECTOR -->
  <div class="col col-sector" id="col-sector">
    <div class="col-hdr">
      <div class="col-title">Nhóm nghề</div>
      <div class="col-search">
        <span class="col-search-ico">⌕</span>
        <input type="text" placeholder="Tìm sector..." id="sec-filter" oninput="filterCol('sector',this.value)">
      </div>
    </div>
    <div id="sec-list"></div>
  </div>

  <!-- COL 2: NGÀNH -->
  <div class="col col-nghe" id="col-nghe">
    <div class="col-hdr">
      <div class="col-title">Ngành</div>
      <div class="col-search">
        <span class="col-search-ico">⌕</span>
        <input type="text" placeholder="Tìm ngành..." id="nghe-filter" oninput="filterCol('nghe',this.value)">
      </div>
    </div>
    <div id="nghe-list"><div class="col-nghe-empty">← Chọn nhóm nghề</div></div>
  </div>

  <!-- COL 3: VỊ TRÍ -->
  <div class="col col-vt" id="col-vt">
    <div class="col-hdr">
      <div class="col-title">Vị trí</div>
      <div class="col-search">
        <span class="col-search-ico">⌕</span>
        <input type="text" placeholder="Tìm vị trí..." id="vt-filter" oninput="filterCol('vt',this.value)">
      </div>
    </div>
    <div id="vt-list"><div class="col-vt-empty">← Chọn ngành</div></div>
  </div>

  <!-- MAIN -->
  <main class="main">
    <div class="landing" id="landing">
      <div class="land-title">Phân loại kĩ năng nghề</div>
      <p class="land-desc">Đang tải dữ liệu, vui lòng chờ...</p>
    </div>
    <div class="sr-view" id="sr-view">
      <div class="sr-hdr">
        <div class="sr-title">Kết quả tìm kiếm</div>
        <div class="sr-sub" id="sr-sub"></div>
      </div>
      <div id="sr-list"></div>
    </div>
    <div id="pos-ct"></div>
  </main>
</div>

<script>
/* ════════════════════════════════════════════════════════════

const MANIFEST = [

  { file: "DuocYTeSucKhoeCNSH_skill_taxonomy_v1.json",           sector: "Dược - Y tế - Sức khoẻ - CNSH",        version: "v1" },
  { file: "Finance_Banking_Insurance_skill_taxonomy_v1.json",    sector: "Tài chính - Ngân hàng - Bảo hiểm",     version: "v1" },

  { file: "KinhDoanh_BanHang_skill_taxonomy_v2.json",            sector: "Kinh doanh & Bán hàng",                version: "v2" },

  { file: "PhimTruyenHinhBaoChiXuatBan_skill_taxonomy_v1.json",  sector: "Phim - Truyền hình - Báo chí",        version: "v1" },
  { file: "SanXuat_skill_taxonomy_v1.json",                      sector: "Sản xuất",                             version: "v1" },
  { file: "TaiXe_skill_taxonomy_v1.json",                        sector: "Tài xế",                               version: "v1" },
  { file: "ThietKe_skill_taxonomy_v1.json",                      sector: "Thiết kế",                             version: "v1" },
  { file: "TuVanChuyenMon_skill_taxonomy_v1.json",               sector: "Tư vấn chuyên môn",                   version: "v1" },

/* ════════════════════════════════════════════════════════════
   END MANIFEST
════════════════════════════════════════════════════════════ */

/* ─── LABEL MAPS ─── */
const TYPE_VI  = { technical:'Kĩ thuật', tool:'Công cụ', domain:'Chuyên ngành',
                   soft:'Kĩ năng mềm', language:'Ngôn ngữ', certification:'Chứng chỉ', other:'Khác' };
const REQ_VI   = { required:'Bắt buộc', preferred:'Ưu tiên' };
const PROF_VI  = { proficient:'Thành thạo', working:'Làm được', awareness:'Nhận biết', expert:'Chuyên sâu', any:'' };
const VN_SHORT = { VN_DOMAIN:'VN-Lĩnh vực', VN_TOOL:'VN-Công cụ', VN_REGULATION:'VN-Quy định' };
const VN_FULL  = { VN_DOMAIN:'Lĩnh vực đặc thù VN', VN_TOOL:'Công cụ đặc thù VN', VN_REGULATION:'Quy định pháp lý VN' };
const TYPE_ORDER = ['technical','tool','domain','soft','language','certification'];

/* ─── STATE ─── */
const DB = [];           // DB[si] = { meta, positions, ngheMap }
let activeSI   = null;   // selected sector index
let activeNghe = null;   // selected nghe string
let currentVT  = null;   // { si, viTri }
let searchQ    = '';
let allLoaded  = false;

/* ─── THEME ─── */
function toggleTheme() {
  const dark = document.body.getAttribute('data-theme') === 'dark';
  document.body.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('theme-ic').textContent = dark ? '◑' : '◐';
}

/* ─── NORMALIZE ─── */
function normalize(raw, si) {
  const meta = raw.taxonomy_metadata || {};
  const positions = (raw.positions || []).map(p => {
    const skills = p.pipeline?.S1_extraction?.skills || p.skills || [];
    return { vi_tri: p.vi_tri, nghe: p.nghe, nhom_nghe: p.nhom_nghe, skills };
  });
  const ngheMap = {};
  positions.forEach(p => {
    if (!ngheMap[p.nghe]) ngheMap[p.nghe] = [];
    ngheMap[p.nghe].push(p);
  });
  // Luôn đếm từ data thực tế — không tin metadata có thể stale
  const allSkills  = positions.flatMap(p => p.skills);
  const vnCount    = allSkills.filter(s => s.iviec_flag).length;
  const certCount  = allSkills.filter(s => s.skill_type === 'certification').length;
  // Tổng hợp skill_type_distribution từ data thực
  const typeDistActual = {};
  allSkills.forEach(s => {
    const t = s.skill_type || 'other';
    typeDistActual[t] = (typeDistActual[t] || 0) + 1;
  });
  // iviec_flags tổng hợp từ data thực
  const iviecActual = {};
  allSkills.filter(s => s.iviec_flag).forEach(s => {
    iviecActual[s.iviec_flag] = (iviecActual[s.iviec_flag] || 0) + 1;
  });
  return {
    meta: {
      sector:   meta.sector   || MANIFEST[si].sector,
      version:  meta.version  || MANIFEST[si].version,
      total_positions: positions.length,           // đếm thực tế
      total_skills:    allSkills.length,           // đếm thực tế
      skill_type_distribution: typeDistActual,     // tính từ data
      iviec_flags:             iviecActual,        // tính từ data
      skills_with_vn_flag:     vnCount,
      certifications_total:    certCount,
    },
    positions,
    ngheMap
  };
}

/* ─── LOAD ALL ─── */
async function loadAll() {
  const bar    = document.getElementById('load-bar');
  const status = document.getElementById('load-status');
  const total  = MANIFEST.length;
  let loaded   = 0;

  const tasks = MANIFEST.map(async (m, si) => {
    try {
      const resp = await fetch(m.file);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const raw = await resp.json();
      DB[si] = normalize(raw, si);
    } catch(e) {
      DB[si] = null; // failed, skip
    }
    loaded++;
    const pct = Math.round(loaded / total * 100);
    bar.style.width = pct + '%';
    status.textContent = `Đang tải... ${loaded}/${total} — ${m.sector}`;
  });

  await Promise.all(tasks);
  allLoaded = true;
  status.textContent = 'Hoàn tất!';
  bar.style.width = '100%';
  await new Promise(r => setTimeout(r, 300));

  // Hide overlay
  document.getElementById('load-overlay').classList.add('done');

  // Build UI
  buildSectorCol();
  updateStats();
  renderLanding();
}

/* ─── STATS ─── */
function updateStats() {
  const loaded = DB.filter(Boolean);
  document.getElementById('st-sectors').textContent   = loaded.length;
  document.getElementById('st-positions').textContent = loaded.reduce((a,d)=>a+d.meta.total_positions,0);
  document.getElementById('st-skills').textContent    = loaded.reduce((a,d)=>a+d.meta.total_skills,0).toLocaleString('vi');
  document.getElementById('st-vn').textContent        = loaded.reduce((a,d)=>a+d.meta.skills_with_vn_flag,0);
}

/* ─── COL 1: SECTOR ─── */
function buildSectorCol() {
  const list = document.getElementById('sec-list');
  list.innerHTML = '';
  MANIFEST.forEach((m, si) => {
    const d = DB[si];
    const btn = document.createElement('button');
    btn.className = 'sec-item';
    btn.dataset.si = si;
    btn.dataset.sector = m.sector.toLowerCase();
    btn.innerHTML = `
      <div class="sec-item-inner">
        <div class="sec-nm">${m.sector}</div>
        <div class="sec-sub">${d ? `${d.meta.total_positions} vị trí · ${d.meta.total_skills} kĩ năng` : 'Lỗi tải'}</div>
      </div>
      <span class="sec-ver">${m.version}</span>`;
    btn.onclick = () => selectSector(si);
    list.appendChild(btn);
  });
}

function selectSector(si) {
  activeSI   = si;
  activeNghe = null;
  currentVT  = null;

  document.querySelectorAll('.sec-item').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.sec-item[data-si="${si}"]`)?.classList.add('active');

  buildNgheCol(si);
  clearVTCol();
  showLanding();
}

/* ─── COL 2: NGÀNH ─── */
function buildNgheCol(si) {
  const d    = DB[si];
  const list = document.getElementById('nghe-list');
  if (!d) { list.innerHTML = '<div class="col-nghe-empty">Không có dữ liệu</div>'; return; }

  list.innerHTML = '';
  document.getElementById('nghe-filter').value = '';

  Object.entries(d.ngheMap).forEach(([nghe, posList]) => {
    const btn = document.createElement('button');
    btn.className = 'nghe-item';
    btn.dataset.nghe = nghe.toLowerCase();
    btn.innerHTML = `<span class="nghe-nm">${nghe}</span><span class="nghe-cnt">${posList.length}</span>`;
    btn.onclick = () => selectNghe(si, nghe);
    list.appendChild(btn);
  });
}

function selectNghe(si, nghe) {
  activeNghe = nghe;
  currentVT  = null;

  document.querySelectorAll('.nghe-item').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.nghe-item').forEach(b=>{
    if (b.querySelector('.nghe-nm')?.textContent === nghe) b.classList.add('active');
  });

  buildVTCol(si, nghe);
  showLanding();
}

/* ─── COL 3: VỊ TRÍ ─── */
function buildVTCol(si, nghe) {
  const d    = DB[si];
  const list = document.getElementById('vt-list');
  if (!d) { list.innerHTML = '<div class="col-vt-empty">Không có dữ liệu</div>'; return; }

  const posList = d.ngheMap[nghe] || [];
  list.innerHTML = '';
  document.getElementById('vt-filter').value = '';

  posList.forEach(pos => {
    const btn = document.createElement('button');
    btn.className = 'vt-item';
    btn.dataset.si  = si;
    btn.dataset.vt  = pos.vi_tri.toLowerCase();
    btn.dataset.vti = pos.vi_tri;
    btn.innerHTML = `<span class="vt-dot"></span><span class="vt-nm">${pos.vi_tri}</span>`;
    btn.onclick = () => selectVT(si, pos.vi_tri, btn);
    list.appendChild(btn);
  });
}

function clearVTCol() {
  document.getElementById('vt-list').innerHTML = '<div class="col-vt-empty">← Chọn ngành</div>';
  document.getElementById('vt-filter').value = '';
}

/* ─── COLUMN FILTER ─── */
function filterCol(col, val) {
  const q = val.trim().toLowerCase();
  if (col === 'sector') {
    document.querySelectorAll('.sec-item').forEach(el=>
      el.classList.toggle('hidden', q && !el.dataset.sector.includes(q)));
  } else if (col === 'nghe') {
    document.querySelectorAll('.nghe-item').forEach(el=>
      el.classList.toggle('hidden', q && !el.dataset.nghe.includes(q)));
  } else if (col === 'vt') {
    document.querySelectorAll('.vt-item').forEach(el=>
      el.classList.toggle('hidden', q && !el.dataset.vt.includes(q)));
  }
}

/* ─── SELECT VỊ TRÍ ─── */
function selectVT(si, viTri, btnEl) {
  currentVT = { si, viTri };

  document.querySelectorAll('.vt-item').forEach(b=>b.classList.remove('active'));
  btnEl?.classList.add('active');

  const d   = DB[si];
  const pos = d?.positions.find(p=>p.vi_tri===viTri);
  if (!pos) return;

  clearMainViews();
  const id  = 'pd_'+si+'_'+viTri.replace(/\W/g,'_');
  let   det = document.getElementById(id);
  if (!det) { det = buildPosDetail(si, pos, d.meta, id); document.getElementById('pos-ct').appendChild(det); }
  det.classList.add('active');
  window.scrollTo(0,0);
}

/* ─── POSITION DETAIL ─── */
function buildPosDetail(si, pos, meta, id) {
  const skills = pos.skills||[];
  const tg={}, rg={required:[],preferred:[]}, tc={};
  skills.forEach(s=>{
    const t=s.skill_type||'other';
    (tg[t]||(tg[t]=[])).push(s);
    (s.requirement==='required'?rg.required:rg.preferred).push(s);
    tc[t]=(tc[t]||0)+1;
  });
  const vnSk=skills.filter(s=>s.iviec_flag);
  const el=document.createElement('div');
  el.className='pos-det'; el.id=id;
  el.innerHTML=`
    <div class="pos-hdr">
      <div class="pos-bc">
        <span>${meta.sector}</span><span class="sep">›</span><span>${pos.nghe}</span>
      </div>
      <div class="pos-title">${pos.vi_tri}</div>
      <div class="pos-chips">
        <span class="pchip tot">${skills.length} kĩ năng</span>
        <span class="pchip">Bắt buộc: ${rg.required.length}</span>
        <span class="pchip">Ưu tiên: ${rg.preferred.length}</span>
        ${vnSk.length?`<span class="pchip vn">Đặc thù VN: ${vnSk.length}</span>`:''}
      </div>
    </div>
    <div class="frow" id="fr-${id}">
      <button class="ftab active" onclick="filterPos('${id}','all',this)">Tất cả <span class="cn">${skills.length}</span></button>
      <button class="ftab" onclick="filterPos('${id}','required',this)">Bắt buộc <span class="cn">${rg.required.length}</span></button>
      <button class="ftab" onclick="filterPos('${id}','preferred',this)">Ưu tiên <span class="cn">${rg.preferred.length}</span></button>
      ${vnSk.length?`<button class="ftab" onclick="filterPos('${id}','vn',this)">Đặc thù VN <span class="cn">${vnSk.length}</span></button>`:''}
      ${TYPE_ORDER.filter(t=>tg[t]).map(t=>
        `<button class="ftab" onclick="filterPos('${id}','${t}',this)">${TYPE_VI[t]} <span class="cn">${tc[t]}</span></button>`
      ).join('')}
    </div>
    <div id="sc-${id}">
      ${TYPE_ORDER.filter(t=>tg[t]).map(t=>`
        <div class="sk-grp" data-type="${t}">
          <div class="sg-lbl">${TYPE_VI[t]} (${tg[t].length})</div>
          <div class="sk-grid">${tg[t].map(renderCard).join('')}</div>
        </div>`).join('')}
      ${tg.other?`<div class="sk-grp" data-type="other">
        <div class="sg-lbl">Khác (${tg.other.length})</div>
        <div class="sk-grid">${tg.other.map(renderCard).join('')}</div></div>`:''}
    </div>`;
  return el;
}

function renderCard(s){
  const req=s.requirement||'preferred';
  const type=s.skill_type||'other';
  const isVN=!!s.iviec_flag;
  const prof=s.proficiency_level&&s.proficiency_level!=='any'?PROF_VI[s.proficiency_level]||s.proficiency_level:'';
  return `
    <div class="sk-card ${req}" data-req="${req}" data-type="${type}" data-vn="${isVN}">
      <div class="sk-nm">${s.label_vi||s.label_en}${isVN?`<span class="vn-badge">${VN_SHORT[s.iviec_flag]||s.iviec_flag}</span>`:''}</div>
      <div class="sk-tags">
        <span class="sk-tag req-${req}">${REQ_VI[req]||req}</span>
        <span class="sk-tag">${TYPE_VI[type]||type}</span>
        ${prof?`<span class="sk-tag">${prof}</span>`:''}
      </div>
      ${s.evidence_text?`<div class="sk-ev">${s.evidence_text}</div>`:''}
    </div>`;
}

function filterPos(posId,filter,btn){
  document.querySelectorAll(`#fr-${posId} .ftab`).forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const ct=document.getElementById('sc-'+posId);
  const cards=ct.querySelectorAll('.sk-card'),grps=ct.querySelectorAll('.sk-grp');
  if(filter==='all'){cards.forEach(c=>c.classList.remove('hidden'));grps.forEach(g=>g.classList.remove('hidden'));return;}
  cards.forEach(c=>{
    const show=filter==='required'||filter==='preferred'?c.dataset.req===filter
              :filter==='vn'?c.dataset.vn==='true':c.dataset.type===filter;
    c.classList.toggle('hidden',!show);
  });
  grps.forEach(g=>g.classList.toggle('hidden',!g.querySelectorAll('.sk-card:not(.hidden)').length));
}

/* ─── LANDING ─── */
function showLanding() {
  currentVT = null;
  document.querySelectorAll('.vt-item').forEach(b=>b.classList.remove('active'));
  clearMainViews();
  document.getElementById('landing').style.display = '';
}

function renderLanding() {
  const loaded = DB.filter(Boolean);
  const totalSkills = loaded.reduce((a,d)=>a+d.meta.total_skills,0);

  // Aggregate skill type distribution across all sectors
  const typeAgg = {};
  loaded.forEach(d=>{
    Object.entries(d.meta.skill_type_distribution||{}).forEach(([k,v])=>{
      typeAgg[k]=(typeAgg[k]||0)+v;
    });
  });
  const vnAgg = {};
  loaded.forEach(d=>{
    Object.entries(d.meta.iviec_flags||{}).forEach(([k,v])=>{
      vnAgg[k]=(vnAgg[k]||0)+v;
    });
  });
  const maxT=Math.max(1,...Object.values(typeAgg));
  const maxV=Math.max(1,...Object.values(vnAgg));

  document.getElementById('landing').innerHTML = `
    <div class="land-title">Phân loại kĩ năng nghề</div>
    <p class="land-desc">Đã tải ${loaded.length}/${MANIFEST.length} nhóm nghề · ${loaded.reduce((a,d)=>a+d.meta.total_positions,0)} vị trí · ${totalSkills.toLocaleString('vi')} kĩ năng.<br>Chọn nhóm nghề ở cột bên trái để bắt đầu.</p>

    ${Object.keys(typeAgg).length ? `
    <div class="dist-section">
      <div class="dist-ttl">Phân bố loại kĩ năng</div>
      <div class="dist-grid">
        ${Object.entries(typeAgg).map(([k,v])=>`
          <div class="dist-item">
            <div class="dist-row"><span class="dist-nm">${TYPE_VI[k]||k}</span><span class="dist-vl">${v.toLocaleString('vi')}</span></div>
            <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(v/maxT*100)}%"></div></div>
          </div>`).join('')}
      </div>
    </div>` : ''}

    ${Object.keys(vnAgg).length ? `
    <div class="dist-section">
      <div class="dist-ttl">Đặc thù Việt Nam — iViec flags</div>
      <div class="dist-grid">
        ${Object.entries(vnAgg).map(([k,v])=>`
          <div class="dist-item">
            <div class="dist-row"><span class="dist-nm">${VN_FULL[k]||k}</span><span class="dist-vl">${v.toLocaleString('vi')}</span></div>
            <div class="bar-bg"><div class="bar-fill" style="width:${Math.round(v/maxV*100)}%"></div></div>
          </div>`).join('')}
      </div>
    </div>` : ''}`;
}

/* ─── SEARCH (global, across all loaded sectors) ─── */
document.addEventListener('DOMContentLoaded', () => {
  // Search is triggered from a global input — add it to topbar dynamically
  const srchWrap = document.createElement('div');
  srchWrap.style.cssText = 'position:relative;margin-right:8px';
  srchWrap.innerHTML = `
    <span style="position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--txm);font-size:11px;pointer-events:none">⌕</span>
    <input id="global-search" type="text" placeholder="Tìm kĩ năng..." autocomplete="off"
      style="padding:5px 8px 5px 26px;background:var(--bg2);border:1px solid var(--brd);
             border-radius:var(--r);color:var(--tx1);font-family:'IBM Plex Sans',sans-serif;
             font-size:12px;outline:none;width:200px;transition:all var(--tr)"
      oninput="handleSearch(this.value)"
      onfocus="this.style.borderColor='var(--brd2)';this.style.background='var(--sur)'"
      onblur="this.style.borderColor='var(--brd)';this.style.background='var(--bg2)'">`;
  document.querySelector('.top-right').prepend(srchWrap);
});

function handleSearch(val) {
  searchQ = val.trim().toLowerCase();
  if (!searchQ) {
    document.getElementById('sr-view').classList.remove('active');
    if (currentVT) {
      const id='pd_'+currentVT.si+'_'+currentVT.viTri.replace(/\W/g,'_');
      clearMainViews();
      document.getElementById(id)?.classList.add('active');
    } else { clearMainViews(); document.getElementById('landing').style.display=''; }
    return;
  }
  clearMainViews();
  const results=[];
  DB.forEach((d,si)=>{
    if(!d) return;
    d.positions.forEach(p=>{
      p.skills.forEach(s=>{
        if((s.label_en||'').toLowerCase().includes(searchQ)||(s.label_vi||'').toLowerCase().includes(searchQ))
          results.push({...s,_pos:p,_si:si,_sector:MANIFEST[si].sector});
      });
    });
  });
  renderSearch(results);
}

function renderSearch(results){
  const view=document.getElementById('sr-view');
  document.getElementById('sr-sub').textContent=`Tìm thấy ${results.length} kĩ năng`;
  view.classList.add('active');
  if(!results.length){
    document.getElementById('sr-list').innerHTML=`<div class="no-res"><div class="ico">◇</div><p>Không tìm thấy kết quả.</p></div>`;
    return;
  }
  const map={};
  results.forEach(s=>{
    const k=s.label_en||s.label_vi;
    if(!map[k]) map[k]={vi:s.label_vi,en:s.label_en,type:s.skill_type,flag:s.iviec_flag,hits:[]};
    map[k].hits.push({si:s._si,sector:s._sector,vt:s._pos.vi_tri,nghe:s._pos.nghe,req:s.requirement});
  });
  document.getElementById('sr-list').innerHTML=Object.entries(map).map(([,it])=>`
    <div class="sri">
      <div class="sri-nm">${hl(it.vi||it.en)}</div>
      <div class="sri-en">${hl(it.en||'')}</div>
      <div class="sri-meta">
        ${it.hits.map(h=>`
          <span class="sri-chip pos ${h.req==='required'?'req':''}"
            onclick="jumpToPos(${h.si},'${esc(h.nghe)}','${esc(h.vt)}')">
            ${h.sector} · ${h.vt}
          </span>`).join('')}
        <span class="sri-chip">${TYPE_VI[it.type]||it.type||''}</span>
        ${it.flag?`<span class="sri-chip vn">${VN_SHORT[it.flag]||it.flag}</span>`:''}
      </div>
    </div>`).join('');
}

function hl(t){
  if(!t) return '';
  return t.replace(new RegExp(`(${searchQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),
    '<mark style="background:var(--acc);color:var(--acc-i);border-radius:1px;padding:0 1px">$1</mark>');
}

function jumpToPos(si,nghe,viTri){
  document.getElementById('global-search').value='';
  handleSearch('');
  selectSector(si);
  selectNghe(si,nghe);
  const btn=document.querySelector(`.vt-item[data-vti="${viTri}"]`);
  selectVT(si,viTri,btn);
}

function esc(s){return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
function clearMainViews(){
  document.getElementById('landing').style.display='none';
  document.getElementById('sr-view').classList.remove('active');
  document.querySelectorAll('.pos-det').forEach(e=>e.classList.remove('active'));
}

/* ─── INIT ─── */
loadAll();
</script>
</body>
</html>
