<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Taxonomy Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d0d0d;
  --bg2:#141414;
  --bg3:#1a1a1a;
  --bg4:#222;
  --border:#2a2a2a;
  --border2:#333;
  --text:#f0f0f0;
  --text2:#aaa;
  --text3:#666;
  --accent:#fff;
  --accent-dim:rgba(255,255,255,0.08);
  --accent-dim2:rgba(255,255,255,0.04);
  --active-bg:#fff;
  --active-text:#000;
  --tag-bg:#1e1e1e;
  --tag-border:#2e2e2e;
  /* skill type palette — muted mono tones */
  --c-tech:#e2e8f0;
  --c-domain:#94a3b8;
  --c-soft:#64748b;
  --c-tool:#cbd5e1;
  --c-cert:#475569;
  --c-lang:#f1f5f9;
  --c-iviec:#ef4444;
  --sidebar-w:240px;
  --sector-w:200px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;font-size:13px}

/* ── TOP BAR ── */
.topbar{
  height:52px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;flex-shrink:0;position:sticky;top:0;z-index:100;
}
.topbar-logo{display:flex;align-items:center;gap:10px}
.topbar-logo h1{font-size:14px;font-weight:600;color:var(--text);letter-spacing:-.2px}
.topbar-logo span{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.topbar-stats{display:flex;gap:0}
.tstat{padding:0 18px;text-align:center;border-left:1px solid var(--border)}
.tstat .n{font-size:16px;font-weight:600;color:var(--text);font-family:'JetBrains Mono',monospace;line-height:1.2}
.tstat .l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-top:1px}

/* ── SHELL ── */
.shell{display:flex;flex:1;overflow:hidden;height:calc(100vh - 52px)}

/* ── SECTOR PANEL (left-most) ── */
.sector-panel{
  width:var(--sector-w);flex-shrink:0;
  background:var(--bg2);border-right:1px solid var(--border);
  overflow-y:auto;padding:16px 0;
}
.sector-panel::-webkit-scrollbar{width:3px}
.sector-panel::-webkit-scrollbar-thumb{background:var(--border2)}
.panel-title{font-size:9px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;padding:0 16px 10px}
.sector-item{
  padding:9px 16px;cursor:pointer;
  border-left:2px solid transparent;
  transition:all .15s;
  display:flex;align-items:center;justify-content:space-between;gap:6px;
}
.sector-item:hover{background:var(--accent-dim2);color:var(--text)}
.sector-item.active{border-left-color:var(--accent);background:var(--accent-dim);color:var(--text)}
.sector-item .sname{font-size:12px;color:var(--text2);font-weight:500;line-height:1.35;flex:1}
.sector-item.active .sname{color:var(--text)}
.sector-item .scnt{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);flex-shrink:0}

/* ── NGHE PANEL (middle) ── */
.nghe-panel{
  width:var(--sidebar-w);flex-shrink:0;
  background:var(--bg2);border-right:1px solid var(--border);
  overflow-y:auto;padding:16px 0;
}
.nghe-panel::-webkit-scrollbar{width:3px}
.nghe-panel::-webkit-scrollbar-thumb{background:var(--border2)}
.nghe-item{
  padding:8px 16px;cursor:pointer;
  border-left:2px solid transparent;
  display:flex;align-items:center;justify-content:space-between;gap:6px;
  transition:all .13s;
}
.nghe-item:hover{background:var(--accent-dim2)}
.nghe-item.active{border-left-color:var(--accent);background:var(--accent-dim)}
.nghe-item .nname{font-size:12px;color:var(--text2);font-weight:500;line-height:1.35;flex:1}
.nghe-item.active .nname{color:var(--text)}
.nghe-item .ncnt{font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);flex-shrink:0}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:24px 28px;background:var(--bg)}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* overview header */
.ov-header{margin-bottom:20px}
.ov-title{font-size:20px;font-weight:600;color:var(--text);letter-spacing:-.3px}
.ov-sub{font-size:11px;color:var(--text3);margin-top:4px}
.ov-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.ov-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px}
.ov-card .on{font-size:22px;font-weight:600;font-family:'JetBrains Mono',monospace;color:var(--text)}
.ov-card .ol{font-size:10px;color:var(--text3);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}

/* legend */
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.li{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3)}
.ld{width:7px;height:7px;border-radius:1px}

/* nghe overview cards */
.pgrid{display:grid;gap:8px}
.pcard{
  background:var(--bg2);border:1px solid var(--border);border-radius:8px;
  overflow:hidden;transition:border-color .15s;
  animation:fi .15s ease both;
}
@keyframes fi{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.pcard:hover{border-color:var(--border2)}
.phead{
  padding:12px 16px;display:flex;align-items:center;
  justify-content:space-between;gap:12px;cursor:pointer;user-select:none;
}
.pname{font-size:13px;font-weight:500;color:var(--text);flex:1;line-height:1.4}
.pmeta{display:flex;gap:5px;align-items:center;flex-shrink:0}
.badge{
  font-size:9px;padding:2px 7px;border-radius:3px;font-weight:500;
  white-space:nowrap;font-family:'JetBrains Mono',monospace;
  background:var(--tag-bg);color:var(--text2);border:1px solid var(--tag-border);
}
.b-vn{background:rgba(239,68,68,.08);color:#ef4444;border-color:rgba(239,68,68,.2)}
.xicon{color:var(--text3);font-size:13px;transition:transform .15s;flex-shrink:0}
.pcard.open .xicon{transform:rotate(180deg)}
.skbar{display:flex;height:3px;border-radius:2px;overflow:hidden;gap:1px;margin-top:10px}
.skbar div{height:100%}

/* skills panel */
.spanel{display:none;padding:0 16px 14px;border-top:1px solid var(--border)}
.pcard.open .spanel{display:block}
.sp-inner{padding-top:12px}
.stype-title{
  font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;
  margin-bottom:7px;color:var(--text3);
}
.slist{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}

/* skill chips */
.chip{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 8px;border-radius:3px;font-size:11px;font-weight:400;
  border:1px solid var(--border);background:var(--tag-bg);color:var(--text2);
  cursor:default;position:relative;transition:border-color .1s;
}
.chip:hover{border-color:var(--border2);z-index:10}
.chip:hover .tip{opacity:1;pointer-events:auto}
/* subtle color differentiation per type */
.chip.technical{color:var(--c-tech);border-color:rgba(226,232,240,.12)}
.chip.domain{color:var(--c-domain)}
.chip.soft{color:var(--c-soft)}
.chip.tool{color:var(--c-tool);border-color:rgba(203,213,225,.12)}
.chip.certification{color:var(--c-cert)}
.chip.language{color:var(--c-lang)}
.vndot{width:4px;height:4px;background:var(--c-iviec);border-radius:50%;flex-shrink:0}

/* tooltip */
.tip{
  position:absolute;bottom:calc(100% + 8px);left:0;
  background:#1c1c1c;border:1px solid #2e2e2e;border-radius:6px;
  padding:8px 10px;font-size:11px;color:var(--text);
  white-space:normal;min-width:180px;max-width:260px;
  opacity:0;pointer-events:none;z-index:300;
  box-shadow:0 8px 24px rgba(0,0,0,.6);transition:opacity .12s;
}
.tip::after{content:'';position:absolute;top:100%;left:12px;border:4px solid transparent;border-top-color:#2e2e2e}
.tip-en{font-weight:600;margin-bottom:2px;color:#f0f0f0}
.tip-vi{color:#888;margin-bottom:3px}
.tip-ev{color:#555;font-style:italic;font-size:10px;line-height:1.4}
.tip-vn{color:#ef4444;margin-top:4px;font-size:10px}
.tip-reason{color:#c0392b;font-size:9px;margin-top:2px}

/* controls */
.ctrls{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.sbox{position:relative}
.sbox input{
  background:var(--bg2);border:1px solid var(--border);border-radius:6px;
  padding:6px 10px 6px 28px;color:var(--text);font-size:12px;
  font-family:'Inter',sans-serif;width:200px;outline:none;transition:border-color .15s;
}
.sbox input:focus{border-color:var(--border2)}
.sbox input::placeholder{color:var(--text3)}
.sicon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:11px}
.fbtn{
  padding:5px 10px;border:1px solid var(--border);border-radius:5px;
  background:var(--bg2);color:var(--text3);font-size:11px;
  cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;
}
.fbtn:hover{border-color:var(--border2);color:var(--text2)}
.fbtn.on{background:var(--accent);border-color:var(--accent);color:#000;font-weight:600}

/* section header in position view */
.sec-header{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:16px;flex-wrap:wrap;gap:10px;
}
.sec-title{font-size:16px;font-weight:600;color:var(--text);letter-spacing:-.2px}
.sec-sub{font-size:11px;color:var(--text3);margin-top:3px}

.topcv-link{font-size:9px;color:var(--text3);text-decoration:none;font-family:'JetBrains Mono',monospace;transition:color .13s}
.topcv-link:hover{color:var(--text2)}

/* loading */
.loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--text3);gap:10px;font-size:12px}
.spinner{width:14px;height:14px;border:1.5px solid var(--border);border-top-color:var(--text3);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* divider in sector panel */
.panel-divider{height:1px;background:var(--border);margin:8px 16px}

@media(max-width:900px){
  .sector-panel{width:160px}
  .nghe-panel{width:180px}
}
@media(max-width:680px){
  .shell{flex-direction:column}
  .sector-panel,.nghe-panel{width:100%;height:auto;border-right:none;border-bottom:1px solid var(--border)}
}

body.light{
  --bg:#ffffff;
  --bg2:#f5f5f5;
  --bg3:#fafafa;
  --bg4:#ffffff;
  --border:#e5e5e5;
  --border2:#dcdcdc;
  --text:#111;
  --text2:#444;
  --text3:#888;
  --accent:#111;
  --accent-dim:rgba(0,0,0,0.08);
  --accent-dim2:rgba(0,0,0,0.04);
  --active-bg:#111;
  --active-text:#fff;
  --tag-bg:#ffffff;
  --tag-border:#e5e5e5;
}

</style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
  <div class="topbar-logo">
    <h1>Skill Taxonomy</h1>
    <span>Vietnam Job Market &middot; iViec Research</span>
  </div>
  
<div style="display:flex;align-items:center;gap:12px">
  <span style="font-size:11px;color:#888;font-family:JetBrains Mono">ver 1.0 · latest update: 04/03/2026</span>
  <button id="themeToggle" style="border:1px solid var(--border);background:var(--bg2);color:var(--text);padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11px">🌙/☀</button>
</div>

  <div class="topbar-stats">
    <div class="tstat"><div class="n" id="sFiles">0</div><div class="l">Ng&agrave;nh</div></div>
    <div class="tstat"><div class="n" id="sPos">0</div><div class="l">V&#7883; tr&iacute;</div></div>
    <div class="tstat"><div class="n" id="sSkills">—</div><div class="l">K&#7929; n&#259;ng</div></div>
  </div>
</header>

<div class="shell">
  <!-- SECTOR PANEL -->
  <nav class="sector-panel" id="sectorPanel">
    <div class="panel-title">Ng&agrave;nh</div>
  </nav>

  <!-- NGHE PANEL -->
  <nav class="nghe-panel" id="nghePanel">
    <div class="panel-title">Nh&oacute;m ngh&#7873;</div>
    <div id="ngheList"></div>
  </nav>

  <!-- CONTENT -->
  <main class="content" id="content">
    <div class="loading"><div class="spinner"></div>&#272;ang t&#7843;i...</div>
  </main>
</div>

<script>
// =====================================================
//  CAU HINH — them / bo file JSON
  var JSON_FILES = [ 
    'CS_VanHanh_skill_taxonomy_v1.json', 
    'Finance_Banking_Insurance_skill_taxonomy_v1.json', 
    'GiaoDuc_DaoTao_skill_taxonomy_v1.json', 
    'HR_Admin_Legal_skill_taxonomy_v1.json', 
    'IT_skill_taxonomy_v1.json', 
    'KeToan_KiemToan_Thue_skill_taxonomy_v1.json', 
    'KinhDoanh_BanHang_skill_taxonomy_v2.json', 
    'LaoDongPhoThong_skill_taxonomy_v1.json', 
    'Logistics_ThuMua_Kho_VanTai_skill_taxonomy_v1.json', 
    'Marketing_PR_QC_skill_taxonomy_v1.json', 
    'SanXuat_skill_taxonomy_v1.json', 
    'XayDung_skill_taxonomy_v1.json', 
    'BanLe_DVDoiSong_skill_taxonomy_v1.json', 
    'DienDienTuVienThong_skill_taxonomy_v1.json', 
    'BatDongSan_skill_taxonomy_v1.json', 
    'NangLuongMoiTruongNongNghiep_skill_taxonomy_v1.json',
    'NhaHangKhachSanDuLich_skill_taxonomy_v1.json',
    'DuocYTeSucKhoeCNSH_skill_taxonomy_v1.json',
    'Luat_skill_taxonomy_v1.json',
    'TuVanChuyenMon_skill_taxonomy_v1.json',
    'PhimTruyenHinhBaoChiXuatBan_skill_taxonomy_v1.json',
    'NhomNgheKhac_skill_taxonomy_v1.json',
    'TaiXe_skill_taxonomy_v1.json',
    'ThietKe_skill_taxonomy_v1.json',
    'BienPhienDich_skill_taxonomy_v1.json' 
  ];
// =====================================================
// Fallback tên nhóm nghề nếu file JSON không có job_group
var NAME_MAP = {
  'CS_VanHanh_skill_taxonomy_v1.json':                    'CS / Vận hành',
  'Finance_Banking_Insurance_skill_taxonomy_v1.json':      'Tài chính / Ngân hàng / Bảo hiểm',
  'GiaoDuc_DaoTao_skill_taxonomy_v1.json':                 'Giáo dục / Đào tạo',
  'HR_Admin_Legal_skill_taxonomy_v1.json':                 'HR / Hành chính / Pháp lý',
  'IT_skill_taxonomy_v1.json':                             'Công nghệ thông tin',
  'KeToan_KiemToan_Thue_skill_taxonomy_v1.json':           'Kế toán / Kiểm toán / Thuế',
  'KinhDoanh_BanHang_skill_taxonomy_v2.json':              'Kinh doanh / Bán hàng',
  'LaoDongPhoThong_skill_taxonomy_v1.json':                'Lao động phổ thông',
  'Logistics_ThuMua_Kho_VanTai_skill_taxonomy_v1.json':    'Logistics / Thu mua / Kho / Vận tải',
  'Marketing_PR_QC_skill_taxonomy_v1.json':                'Marketing / PR / Quảng cáo',
  'SanXuat_skill_taxonomy_v1.json':                        'Sản xuất',
  'XayDung_skill_taxonomy_v1.json':                        'Xây dựng',
  'BanLe_DVDoiSong_skill_taxonomy_v1.json':                'Bán lẻ / Dịch vụ đời sống',
  'DienDienTuVienThong_skill_taxonomy_v1.json':            'Điện / Điện tử / Viễn thông',
  'BatDongSan_skill_taxonomy_v1.json':                     'Bất động sản',
  'NangLuongMoiTruongNongNghiep_skill_taxonomy_v1.json':   'Năng lượng / Môi trường / Nông nghiệp',
  'NhaHangKhachSanDuLich_skill_taxonomy_v1.json':          'Nhà hàng / Khách sạn / Du lịch',
  'DuocYTeSucKhoeCNSH_skill_taxonomy_v1.json':             'Dược / Y tế / Sức khỏe / Công nghệ sinh học',
  'Luat_skill_taxonomy_v1.json':                           'Luật',
  'TuVanChuyenMon_skill_taxonomy_v1.json':                 'Tư vấn chuyên môn',
  'PhimTruyenHinhBaoChiXuatBan_skill_taxonomy_v1.json':    'Phim / Truyền hình / Báo chí / Xuất bản',
  'NhomNgheKhac_skill_taxonomy_v1.json':                   'Nhóm nghề khác',
  'TaiXe_skill_taxonomy_v1.json':                          'Tài xế / Lái xe',
  'ThietKe_skill_taxonomy_v1.json':                        'Thiết kế',
  'BienPhienDich_skill_taxonomy_v1.json':                  'Biên / Phiên dịch'
};
// =====================================================

var TC = {
  technical:'#e2e8f0', domain:'#94a3b8', soft:'#64748b',
  tool:'#cbd5e1', certification:'#475569', language:'#f1f5f9'
};
var TL = {
  technical:'Kỹ thuật', domain:'Chuyên môn', soft:'Kỹ năng mềm',
  tool:'Công cụ', certification:'Chứng chỉ', language:'Ngoại ngữ'
};

var datasets    = [];
var activeSector = null;
var activeNghe   = null;
var filterType   = null;
var searchQuery  = '';

// ── LOAD ──────────────────────────────────────────
function loadAll() {
  var pending = JSON_FILES.length;
  if (!pending) { showError(); return; }
  JSON_FILES.forEach(function(f) {
    fetch(f)
      .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(function(json) { addDataset(json, f); })
      .catch(function(e) { console.warn('Skip ' + f + ':', e.message); })
      .finally(function() { if (--pending === 0) boot(); });
  });
}

function addDataset(json, fileName) {
  var meta      = json.taxonomy_metadata || {};
  var positions = json.positions || [];
  // Priority: 1) job_group from JSON  2) NAME_MAP  3) filename stripped
  var name = meta.job_group || NAME_MAP[fileName] || fileName.replace(/_skill_taxonomy_v\d+\.json$/i,'').replace(/_/g,' ');
  var nghes = [];
  if (json.nghes && json.nghes.length) {
    nghes = json.nghes;
  } else if (meta.sub_categories) {
    nghes = Object.keys(meta.sub_categories).map(function(k) {
      var v = meta.sub_categories[k];
      return { nghe: k, position_count: (typeof v === 'object') ? v.position_count : v };
    });
  } else {
    var counts = {};
    positions.forEach(function(p) { counts[p.nghe] = (counts[p.nghe]||0)+1; });
    nghes = Object.keys(counts).map(function(k) { return { nghe:k, position_count:counts[k] }; });
  }
  datasets.push({
    idx:      datasets.length,
    fileName: fileName,
    name:     name,
    name_en:  meta.job_group_en || '',
    metadata: meta,
    positions:positions,
    nghes:    nghes
  });
}

function showError() {
  document.getElementById('content').innerHTML =
    '<div class="loading">Không tìm thấy file JSON. Đặt cùng thư mục với index.html và chạy qua HTTP server.</div>';
}

function boot() {
  if (!datasets.length) { showError(); return; }
  updateStats();
  renderSectorPanel();
  activeSector = 0;
  activeNghe   = '__all__';
  renderNghePanel();
  renderOverview(cur());
  highlightSector();
}

function cur() { return datasets[activeSector]; }

function updateStats() {
  var p = 0, s = 0;
  datasets.forEach(function(d) { p += d.positions.length; s += (d.metadata.total_skills_extracted||0); });
  document.getElementById('sFiles').textContent  = datasets.length;
  document.getElementById('sPos').textContent    = p;
  document.getElementById('sSkills').textContent = s ? s.toLocaleString() : '—';
}

// ── SECTOR PANEL ──────────────────────────────────
function renderSectorPanel() {
  var panel = document.getElementById('sectorPanel');
  panel.innerHTML = '<div class="panel-title">Nghề</div>';
  datasets.forEach(function(ds) {
    var el = document.createElement('div');
    el.className = 'sector-item' + (activeSector === ds.idx ? ' active' : '');
    el.dataset.idx = ds.idx;
    el.innerHTML =
      '<span class="sname">' + esc(ds.name) + '</span>' +
      '<span class="scnt">' + ds.positions.length + '</span>';
    el.addEventListener('click', function() { selSector(ds.idx); });
    panel.appendChild(el);
  });
}

function highlightSector() {
  document.querySelectorAll('.sector-item').forEach(function(el) {
    el.classList.toggle('active', parseInt(el.dataset.idx) === activeSector);
  });
}

function selSector(idx) {
  activeSector = idx;
  activeNghe   = '__all__';
  filterType   = null;
  searchQuery  = '';
  highlightSector();
  renderNghePanel();
  renderOverview(cur());
}

// ── NGHE PANEL ────────────────────────────────────
function renderNghePanel() {
  var list = document.getElementById('ngheList');
  list.innerHTML = '';
  var ds = cur();

  function makeItem(label, count, val) {
    var el = document.createElement('div');
    el.className = 'nghe-item' + (activeNghe === val ? ' active' : '');
    el.dataset.val = val;
    el.innerHTML = '<span class="nname">' + esc(label) + '</span><span class="ncnt">' + count + '</span>';
    el.addEventListener('click', function() { selNghe(val); });
    return el;
  }

  list.appendChild(makeItem('Tổng quan', ds.positions.length, '__all__'));
  ds.nghes.forEach(function(n) { list.appendChild(makeItem(n.nghe, n.position_count, n.nghe)); });
}

function highlightNghe() {
  document.querySelectorAll('#ngheList .nghe-item').forEach(function(el) {
    el.classList.toggle('active', el.dataset.val === activeNghe);
  });
}

function selNghe(nghe) {
  activeNghe  = nghe;
  filterType  = null;
  searchQuery = '';
  highlightNghe();
  if (nghe === '__all__') renderOverview(cur());
  else renderPositions(cur().positions.filter(function(p) { return p.nghe === nghe; }), nghe);
}

// ── OVERVIEW ──────────────────────────────────────
function renderOverview(ds) {
  var tc = {}, ivN = 0;
  ds.positions.forEach(function(p) {
    skillsOf(p).forEach(function(s) {
      tc[s.skill_type] = (tc[s.skill_type]||0)+1;
      if (s.iviec_flag) ivN++;
    });
  });
  var m = ds.metadata;
  var totalSk = m.total_skills_extracted || objSum(tc);

  var html = '<div class="ov-header">' +
    '<div class="ov-title">' + esc(ds.name) + '</div>' +
    '<div class="ov-sub">' + esc(ds.name_en) +
    (m.source_sites ? ' &middot; ' + m.source_sites.join(', ') : '') +
    ' &middot; ' + ds.positions.length + ' vị trí</div></div>';

  html += '<div class="ov-cards">' +
    [['Vị trí', ds.positions.length], ['Kỹ năng', totalSk],
     ['iViec VN', m.total_iviec_proposals||ivN], ['Nghề', ds.nghes.length]]
    .map(function(r) {
      return '<div class="ov-card"><div class="on">' + Number(r[1]).toLocaleString() +
        '</div><div class="ol">' + r[0] + '</div></div>';
    }).join('') + '</div>';

  html += legendHtml(tc);
  html += '<div class="pgrid">';

  ds.nghes.forEach(function(n) {
    var pos = ds.positions.filter(function(p) { return p.nghe === n.nghe; });
    var sc = {};
    pos.forEach(function(p) { skillsOf(p).forEach(function(s) { sc[s.skill_type]=(sc[s.skill_type]||0)+1; }); });
    html += '<div class="pcard" data-nghe="' + esc(n.nghe) + '" style="cursor:pointer">' +
      '<div class="phead">' +
      '<div class="pname">' + esc(n.nghe) + '</div>' +
      '<div class="pmeta">' +
      '<span class="badge">' + n.position_count + ' vị trí</span>' +
      '<span class="badge">' + objSum(sc) + ' skills</span>' +
      '</div></div>' +
      '<div style="padding:0 16px 12px">' +
      '<div class="skbar">' +
      Object.keys(sc).map(function(t) {
        return '<div style="flex:' + sc[t] + ';background:' + (TC[t]||'#444') + '" title="' + (TL[t]||t) + ': ' + sc[t] + '"></div>';
      }).join('') +
      '</div></div></div>';
  });

  html += '</div>';
  var el = document.getElementById('content');
  el.innerHTML = html;
  el.querySelectorAll('.pcard[data-nghe]').forEach(function(card) {
    card.addEventListener('click', function() { selNghe(card.dataset.nghe); });
  });
}

// ── POSITIONS ─────────────────────────────────────
function renderPositions(positions, title) {
  var ds = cur();
  var html = '<div class="sec-header">' +
    '<div><div class="sec-title">' + esc(title) + '</div>' +
    '<div class="sec-sub">' + positions.length + ' vị trí &middot; ' + esc(ds.name) + '</div></div>' +
    '<div class="ctrls">' +
    '<div class="sbox"><span class="sicon">&#128269;</span>' +
    '<input id="si" type="text" placeholder="Tìm kỹ năng..." value="' + esc(searchQuery) + '"></div>' +
    Object.keys(TL).map(function(t) {
      return '<button class="fbtn' + (filterType===t?' on':'') + '" data-ft="' + t + '">' + TL[t] + '</button>';
    }).join('') +
    ((filterType||searchQuery) ? '<button class="fbtn on" id="clearBtn">&#10005;</button>' : '') +
    '</div></div>';

  html += legendHtml();
  html += '<div class="pgrid" id="pg">' + positions.map(posCard).join('') + '</div>';

  var el = document.getElementById('content');
  el.innerHTML = html;

  var si = document.getElementById('si');
  if (si) {
    si.addEventListener('input', function() { searchQuery = this.value; rerender(); });
    si.focus(); si.setSelectionRange(si.value.length, si.value.length);
  }
  el.querySelectorAll('.fbtn[data-ft]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      filterType = (filterType === btn.dataset.ft) ? null : btn.dataset.ft;
      rerender();
    });
  });
  var cb = document.getElementById('clearBtn');
  if (cb) cb.addEventListener('click', function() { filterType=null; searchQuery=''; rerender(); });

  el.querySelectorAll('.phead').forEach(function(ph) {
    ph.addEventListener('click', function() { ph.closest('.pcard').classList.toggle('open'); });
  });
  if (filterType || searchQuery) el.querySelectorAll('.pcard').forEach(function(c) { c.classList.add('open'); });
}

function posCard(pos) {
  var sk    = skillsOf(pos);
  var meta  = (((pos.pipeline||{}).S1_extraction)||{}).meta || {};
  var iviec = sk.filter(function(s) { return s.iviec_flag; });
  var show  = sk.slice();
  if (filterType) show = show.filter(function(s) { return s.skill_type === filterType; });
  if (searchQuery) {
    var q = searchQuery.toLowerCase();
    show = show.filter(function(s) {
      return (s.label_en||'').toLowerCase().indexOf(q) >= 0 || (s.label_vi||'').toLowerCase().indexOf(q) >= 0;
    });
  }
  if ((filterType||searchQuery) && !show.length) return '';
  var display = (filterType||searchQuery) ? show : sk;
  var conf = meta.extraction_confidence ? (meta.extraction_confidence*100).toFixed(0)+'%' : '';
  return '<div class="pcard">' +
    '<div class="phead">' +
    '<div><div class="pname">' + esc(pos.vi_tri) + '</div>' +
    (pos.topcv_url ? '<a class="topcv-link" href="' + pos.topcv_url + '" target="_blank" onclick="event.stopPropagation()">&#8599; TopCV</a>' : '') +
    '</div><div class="pmeta">' +
    '<span class="badge">' + sk.length + ' skills</span>' +
    (conf ? '<span class="badge">' + conf + '</span>' : '') +
    (iviec.length ? '<span class="badge b-vn">VN ' + iviec.length + '</span>' : '') +
    '<span class="xicon">&#8964;</span>' +
    '</div></div>' +
    '<div class="spanel"><div class="sp-inner">' + skillGroups(display) + '</div></div>' +
    '</div>';
}

function skillGroups(sk) {
  var by = {};
  sk.forEach(function(s) { if (!by[s.skill_type]) by[s.skill_type]=[]; by[s.skill_type].push(s); });
  return Object.keys(by).map(function(type) {
    var list = by[type];
    return '<div style="margin-bottom:10px">' +
      '<div class="stype-title" style="color:' + (TC[type]||'#666') + '">' + (TL[type]||type) + ' (' + list.length + ')</div>' +
      '<div class="slist">' +
      list.map(function(s) {
        return '<span class="chip ' + esc(s.skill_type) + '">' +
          (s.iviec_flag ? '<span class="vndot"></span>' : '') +
          esc(s.label_vi || s.label_en) +
          '<span class="tip">' +
          '<div class="tip-en">' + esc(s.label_vi || s.label_en) + '</div>' +
          (s.label_en ? '<div class="tip-vi">' + esc(s.label_en) + '</div>' : '') +
          (s.evidence_text ? '<div class="tip-ev">' + esc(s.evidence_text) + '</div>' : '') +
          (s.iviec_flag ? '<div class="tip-vn">&#127474;&#127475; ' + esc(s.iviec_flag) + '</div>' : '') +
          (s.iviec_reason ? '<div class="tip-reason">' + esc(s.iviec_reason) + '</div>' : '') +
          '</span></span>';
      }).join('') +
      '</div></div>';
  }).join('');
}

function legendHtml(tc) {
  return '<div class="legend">' +
    Object.keys(TC).map(function(t) {
      return '<div class="li"><div class="ld" style="background:' + TC[t] + '"></div>' + TL[t] +
        (tc ? ' <span style="color:#333">(' + (tc[t]||0) + ')</span>' : '') + '</div>';
    }).join('') +
    '<div class="li"><div class="ld" style="background:#ef4444;border-radius:50%"></div>iViec VN</div>' +
    '</div>';
}

// ── HELPERS ───────────────────────────────────────
function skillsOf(pos) { return ((((pos.pipeline||{}).S1_extraction)||{}).skills)||[]; }
function objSum(o) { return Object.keys(o).reduce(function(s,k){return s+o[k];},0); }
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function rerender() {
  if (activeNghe === '__all__') renderOverview(cur());
  else renderPositions(cur().positions.filter(function(p){return p.nghe===activeNghe;}), activeNghe);
}

loadAll();
</script>

<script>
document.addEventListener("DOMContentLoaded",function(){
  var btn=document.getElementById("themeToggle");
  if(!btn) return;
  btn.onclick=function(){
    document.body.classList.toggle("light");
  };
});
</script>
