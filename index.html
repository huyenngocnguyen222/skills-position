<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Taxonomy — Phân loại kĩ năng nghề</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════
   TOKENS
══════════════════════════════════════════════ */
:root {
  --bg:#f4f3f0; --bg2:#eceae6; --bg3:#e0deda;
  --sur:#fff; --brd:#dddbd7; --brd2:#b0ada8;
  --tx1:#1a1917; --tx2:#4a4845; --txm:#9a9895;
  --acc:#1a1917; --acc-i:#f4f3f0;
  --acc-s:rgba(26,25,23,.06); --acc-s2:rgba(26,25,23,.11);
  --vn-bg:#f0ede8; --vn-c:#7a5535; --vn-brd:#d4c4b0;
  --sh:0 1px 2px rgba(0,0,0,.05),0 4px 16px rgba(0,0,0,.04);
  --shm:0 2px 8px rgba(0,0,0,.08),0 8px 24px rgba(0,0,0,.05);
  --r:4px; --tr:150ms ease; --sbW:288px; --topH:50px;
}
[data-theme=dark] {
  --bg:#131211; --bg2:#1d1c1a; --bg3:#272522;
  --sur:#1d1c1a; --brd:#2e2c29; --brd2:#524f4a;
  --tx1:#eeece8; --tx2:#a8a5a0; --txm:#635f5a;
  --acc:#eeece8; --acc-i:#131211;
  --acc-s:rgba(238,236,232,.06); --acc-s2:rgba(238,236,232,.11);
  --vn-bg:#2a2219; --vn-c:#d4aa78; --vn-brd:#4a3a28;
  --sh:0 1px 2px rgba(0,0,0,.3),0 4px 16px rgba(0,0,0,.2);
  --shm:0 2px 8px rgba(0,0,0,.4),0 8px 24px rgba(0,0,0,.3);
}

/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{font-family:"DM Sans",sans-serif;background:var(--bg);color:var(--tx1);
  display:flex;flex-direction:column;min-height:100vh;
  transition:background var(--tr),color var(--tr)}
button{cursor:pointer;font-family:inherit;border:none;background:none}

/* ── TOPBAR ── */
.topbar{position:fixed;top:0;left:0;right:0;height:var(--topH);
  background:var(--sur);border-bottom:1px solid var(--brd);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px 0 0;z-index:300;box-shadow:var(--sh)}
.top-brand{width:var(--sbW);height:100%;display:flex;align-items:center;
  gap:10px;padding:0 16px;border-right:1px solid var(--brd);flex-shrink:0}
.brand-dot{width:6px;height:6px;border-radius:50%;background:var(--acc);flex-shrink:0}
.brand-name{font-family:"DM Mono",monospace;font-size:11px;font-weight:500;
  letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
.top-right{display:flex;align-items:center;gap:8px;padding-left:16px}
.top-meta{font-family:"DM Mono",monospace;font-size:9px;color:var(--txm);
  letter-spacing:.06em;line-height:1.5;text-align:right}
.btn-ic{width:30px;height:30px;border:1px solid var(--brd);background:var(--bg2);
  color:var(--tx1);border-radius:var(--r);display:flex;align-items:center;
  justify-content:center;font-size:13px;transition:all var(--tr)}
.btn-ic:hover{background:var(--bg3);border-color:var(--brd2)}

/* ── SHELL ── */
.shell{display:flex;margin-top:var(--topH);min-height:calc(100vh - var(--topH))}

/* ══════════════════════════════════════════════
   SIDEBAR
══════════════════════════════════════════════ */
.sidebar{width:var(--sbW);flex-shrink:0;background:var(--sur);
  border-right:1px solid var(--brd);position:fixed;top:var(--topH);
  left:0;bottom:0;overflow-y:auto;overflow-x:hidden;z-index:200;
  display:flex;flex-direction:column}
.sidebar::-webkit-scrollbar{width:3px}
.sidebar::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px}

/* Search */
.sb-search{padding:10px;border-bottom:1px solid var(--brd);
  position:sticky;top:0;background:var(--sur);z-index:10}
.sb-search-inner{position:relative}
.sb-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);
  color:var(--txm);font-size:12px;pointer-events:none}
.sb-input{width:100%;padding:7px 8px 7px 28px;background:var(--bg2);
  border:1px solid var(--brd);border-radius:var(--r);color:var(--tx1);
  font-family:"DM Sans",sans-serif;font-size:12px;outline:none;transition:all var(--tr)}
.sb-input:focus{border-color:var(--brd2);background:var(--sur)}
.sb-input::placeholder{color:var(--txm)}
.sb-cnt{font-family:"DM Mono",monospace;font-size:9px;color:var(--txm);
  margin-top:5px;min-height:13px}

/* ── TREE ── */
.sb-tree{flex:1;padding:6px 0 24px}

/* L1 — Sector */
.tree-sector{border-bottom:1px solid var(--brd)}
.tree-sec-hdr{width:100%;text-align:left;padding:8px 12px 8px 14px;
  display:flex;align-items:center;gap:8px;
  border-left:3px solid transparent;transition:all var(--tr)}
.tree-sec-hdr:hover{background:var(--acc-s)}
.tree-sec-hdr.open{border-left-color:var(--brd2)}
.tree-sec-hdr.active-branch{border-left-color:var(--acc)}
.sec-arrow{width:14px;height:14px;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;font-size:9px;color:var(--txm);transition:transform var(--tr)}
.tree-sec-hdr.open .sec-arrow{transform:rotate(90deg)}
.sec-info{flex:1;min-width:0}
.sec-name{font-size:12px;font-weight:700;color:var(--tx1);letter-spacing:.01em;
  line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sec-meta{font-family:"DM Mono",monospace;font-size:8px;color:var(--txm);
  margin-top:2px;letter-spacing:.06em}
.sec-count{font-family:"DM Mono",monospace;font-size:8.5px;padding:2px 5px;
  border-radius:2px;background:var(--bg2);color:var(--txm);
  border:1px solid var(--brd);flex-shrink:0;letter-spacing:.04em}
.tree-sec-hdr.active-branch .sec-count{background:var(--acc);color:var(--acc-i);border-color:var(--acc)}

/* Loading state inside sector */
.sec-loading{padding:10px 14px 10px 28px;
  font-family:"DM Mono",monospace;font-size:9.5px;color:var(--txm);
  letter-spacing:.07em;display:flex;align-items:center;gap:8px}
.spin{display:inline-block;animation:spin .8s linear infinite;font-size:11px}
@keyframes spin{to{transform:rotate(360deg)}}

.sec-error{padding:10px 14px 10px 28px;font-size:11px;color:#c0392b;
  display:flex;align-items:center;gap:6px}
.sec-error .retry{font-family:"DM Mono",monospace;font-size:9px;
  text-decoration:underline;cursor:pointer;color:var(--txm)}
.sec-error .retry:hover{color:var(--tx1)}

.tree-sec-body{display:none}
.tree-sec-body.open{display:block}

/* L2 — Ngành */
.tree-nghe-hdr{width:100%;text-align:left;padding:5px 12px 5px 28px;
  display:flex;align-items:center;gap:6px;border-left:3px solid transparent;
  transition:all var(--tr)}
.tree-nghe-hdr:hover{background:var(--acc-s)}
.tree-nghe-hdr.active-branch{border-left-color:var(--brd2)}
.nghe-arrow{font-size:8.5px;color:var(--txm);flex-shrink:0;
  transition:transform var(--tr);width:12px;text-align:center}
.tree-nghe-hdr.open .nghe-arrow{transform:rotate(90deg)}
.nghe-name{font-size:11.5px;font-weight:500;color:var(--tx2);flex:1;
  line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tree-nghe-hdr.active-branch .nghe-name{color:var(--tx1)}
.nghe-cnt{font-family:"DM Mono",monospace;font-size:8.5px;color:var(--txm);flex-shrink:0}
.tree-nghe-body{display:none}
.tree-nghe-body.open{display:block}

/* L3 — Vị trí */
.tree-vt-btn{width:100%;text-align:left;padding:4px 12px 4px 44px;
  display:flex;align-items:center;gap:6px;border-left:3px solid transparent;
  transition:all var(--tr);color:var(--txm);font-size:11px}
.tree-vt-btn:hover{background:var(--acc-s);color:var(--tx2)}
.tree-vt-btn.active{background:var(--acc-s2);color:var(--tx1);
  border-left-color:var(--acc);font-weight:600}
.vt-dot{width:4px;height:4px;border-radius:50%;background:var(--brd2);
  flex-shrink:0;transition:background var(--tr)}
.tree-vt-btn.active .vt-dot{background:var(--acc)}

/* ══════════════════════════════════════════════
   MAIN
══════════════════════════════════════════════ */
.main{margin-left:var(--sbW);flex:1;padding:32px 40px;min-width:0}

/* ── LANDING ── */
.landing{display:block}
.land-eyebrow{font-family:"DM Mono",monospace;font-size:9.5px;
  letter-spacing:.14em;text-transform:uppercase;color:var(--txm);margin-bottom:8px}
.land-title{font-family:"Instrument Serif",serif;font-size:40px;
  line-height:1.1;letter-spacing:-.02em;color:var(--tx1);margin-bottom:10px}
.land-desc{font-size:13px;color:var(--tx2);line-height:1.65;
  max-width:520px;margin-bottom:32px}

/* Summary cards */
.sum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));
  gap:8px;margin-bottom:28px}
.sum-card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);
  padding:16px 18px;transition:all var(--tr)}
.sum-card:hover{border-color:var(--brd2);box-shadow:var(--shm)}
.sum-card.hi{background:var(--acc);border-color:var(--acc)}
.s-num{font-family:"DM Mono",monospace;font-size:28px;font-weight:500;
  letter-spacing:-.03em;line-height:1;color:var(--tx1);margin-bottom:5px}
.sum-card.hi .s-num{color:var(--acc-i)}
.s-lbl{font-size:11px;color:var(--txm)}
.sum-card.hi .s-lbl{color:var(--acc-i);opacity:.7}
.s-sub{font-family:"DM Mono",monospace;font-size:8.5px;color:var(--txm);margin-top:3px}
.sum-card.hi .s-sub{color:var(--acc-i);opacity:.45}

/* Sector overview list */
.sec-overview{margin-top:4px}
.ov-hdr{font-family:"DM Mono",monospace;font-size:8.5px;text-transform:uppercase;
  letter-spacing:.18em;color:var(--txm);margin-bottom:10px;
  display:flex;align-items:center;gap:10px}
.ov-hdr::after{content:'';flex:1;height:1px;background:var(--brd)}
.ov-list{display:flex;flex-direction:column;gap:5px}
.ov-item{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);
  padding:12px 16px;display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;transition:all var(--tr)}
.ov-item:hover{border-color:var(--brd2);box-shadow:var(--sh);
  transform:translateX(2px)}
.ov-left{}
.ov-name{font-size:13px;font-weight:600;color:var(--tx1);margin-bottom:3px}
.ov-stats{font-family:"DM Mono",monospace;font-size:9px;color:var(--txm);
  letter-spacing:.05em}
.ov-right{display:flex;align-items:center;gap:6px}
.ov-ver{font-family:"DM Mono",monospace;font-size:8.5px;padding:2px 6px;
  border-radius:2px;background:var(--bg2);color:var(--txm);
  border:1px solid var(--brd)}
.ov-arr{color:var(--txm);font-size:12px}

/* ── POSITION DETAIL ── */
.pos-det{display:none}
.pos-det.active{display:block}
.pos-hdr{margin-bottom:22px;padding-bottom:20px;border-bottom:1px solid var(--brd)}
.pos-bc{font-family:"DM Mono",monospace;font-size:9px;color:var(--txm);
  letter-spacing:.07em;margin-bottom:8px;display:flex;align-items:center;
  gap:5px;flex-wrap:wrap}
.pos-bc .sep{opacity:.35}
.pos-title{font-family:"Instrument Serif",serif;font-size:30px;
  line-height:1.15;letter-spacing:-.01em;color:var(--tx1);margin-bottom:12px}
.pos-chips{display:flex;flex-wrap:wrap;gap:5px}
.pchip{font-family:"DM Mono",monospace;font-size:9px;padding:3px 8px;
  border-radius:2px;border:1px solid var(--brd);color:var(--tx2);letter-spacing:.05em}
.pchip.tot{background:var(--acc);color:var(--acc-i);border-color:var(--acc)}
.pchip.vn{background:var(--vn-bg);color:var(--vn-c);border-color:var(--vn-brd)}

/* Filter */
.frow{display:flex;gap:4px;margin-bottom:18px;flex-wrap:wrap}
.ftab{font-family:"DM Mono",monospace;font-size:9px;letter-spacing:.07em;
  text-transform:uppercase;padding:4px 9px;border-radius:2px;
  border:1px solid var(--brd);color:var(--txm);transition:all var(--tr)}
.ftab:hover{border-color:var(--brd2);color:var(--tx2)}
.ftab.active{background:var(--acc);color:var(--acc-i);border-color:var(--acc)}
.ftab .cn{opacity:.55;margin-left:2px}

/* Skill groups */
.sk-grp{margin-bottom:24px}
.sg-lbl{font-family:"DM Mono",monospace;font-size:8.5px;text-transform:uppercase;
  letter-spacing:.18em;color:var(--txm);margin-bottom:9px;
  display:flex;align-items:center;gap:8px}
.sg-lbl::after{content:'';flex:1;height:1px;background:var(--brd)}
.sk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:6px}
.sk-card{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);
  padding:11px 13px;transition:all var(--tr);position:relative;overflow:hidden}
.sk-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.sk-card.required::before{background:var(--acc)}
.sk-card.preferred::before{background:var(--brd2)}
.sk-card:hover{border-color:var(--brd2);box-shadow:var(--shm)}
.sk-nm{font-size:12.5px;font-weight:600;color:var(--tx1);line-height:1.35;margin-bottom:6px}
.vn-badge{display:inline-block;font-family:"DM Mono",monospace;font-size:7.5px;
  background:var(--vn-bg);color:var(--vn-c);padding:1px 4px;border-radius:2px;
  margin-left:5px;vertical-align:middle;border:1px solid var(--vn-brd);letter-spacing:.04em}
.sk-tags{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px}
.sk-tag{font-family:"DM Mono",monospace;font-size:8px;padding:2px 5px;
  border-radius:1px;border:1px solid var(--brd);color:var(--txm);letter-spacing:.03em}
.sk-tag.req-required{background:var(--acc);color:var(--acc-i);border-color:var(--acc)}
.sk-tag.req-preferred{border-color:var(--brd2);color:var(--tx2)}
.sk-ev{font-size:10.5px;color:var(--txm);font-style:italic;line-height:1.55;
  border-top:1px solid var(--brd);padding-top:7px;display:none}
.sk-card:hover .sk-ev{display:block}

/* Loading skeleton */
.sk-skeleton{height:80px;background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:var(--r);
  border:1px solid var(--brd)}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── SEARCH RESULTS ── */
.sr-view{display:none}
.sr-view.active{display:block}
.sr-hdr{margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--brd)}
.sr-title{font-family:"Instrument Serif",serif;font-size:26px;letter-spacing:-.01em;margin-bottom:4px}
.sr-sub{font-family:"DM Mono",monospace;font-size:9.5px;color:var(--txm)}
.sri{background:var(--sur);border:1px solid var(--brd);border-radius:var(--r);
  padding:11px 13px;margin-bottom:6px;transition:all var(--tr);
  border-left:3px solid transparent}
.sri:hover{border-color:var(--brd2);border-left-color:var(--acc);box-shadow:var(--sh)}
.sri-nm{font-size:13px;font-weight:600;color:var(--tx1);margin-bottom:2px}
.sri-en{font-size:10.5px;color:var(--txm);margin-bottom:7px}
.sri-meta{display:flex;flex-wrap:wrap;gap:4px}
.sri-chip{font-family:"DM Mono",monospace;font-size:8.5px;padding:2px 6px;
  border-radius:1px;border:1px solid var(--brd);color:var(--txm);letter-spacing:.03em}
.sri-chip.pos{cursor:pointer;transition:all var(--tr)}
.sri-chip.pos:hover{border-color:var(--brd2);color:var(--tx1);background:var(--acc-s)}
.sri-chip.req{background:var(--acc);color:var(--acc-i);border-color:var(--acc)}
.sri-chip.vn{background:var(--vn-bg);color:var(--vn-c);border-color:var(--vn-brd)}
.sri-chip.loading-chip{animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.no-res{text-align:center;padding:80px 20px;color:var(--txm)}
.no-res .ico{font-size:32px;opacity:.2;margin-bottom:12px}
.no-res p{font-size:13px}

.hidden{display:none !important}
</style>
</head>
<body data-theme="light">

<header class="topbar">
  <div class="top-brand">
    <span class="brand-dot"></span>
    <span class="brand-name">Skill Taxonomy</span>
  </div>
  <div class="top-right">
    <div class="top-meta">v1 &nbsp;·&nbsp; 04/03/2026</div>
    <button class="btn-ic" onclick="toggleTheme()" title="Đổi giao diện">
      <span id="theme-ic">◑</span>
    </button>
  </div>
</header>

<div class="shell">
  <aside class="sidebar">
    <div class="sb-search">
      <div class="sb-search-inner">
        <span class="sb-ico">⌕</span>
        <input class="sb-input" id="srch" type="text"
          placeholder="Tìm kĩ năng..." autocomplete="off"
          oninput="handleSearch(this.value)">
      </div>
      <div class="sb-cnt" id="srch-cnt"></div>
    </div>
    <div class="sb-tree" id="sb-tree"></div>
  </aside>

  <main class="main">
    <div class="landing" id="landing"></div>
    <div class="sr-view" id="sr-view">
      <div class="sr-hdr">
        <div class="sr-title">Kết quả tìm kiếm</div>
        <div class="sr-sub" id="sr-sub"></div>
      </div>
      <div id="sr-list"></div>
    </div>
    <div id="pos-ct"></div>
  </main>
</div>

<script>
/* ════════════════════════════════════════════════════════════════
   ╔═══════════════════════════════════════════════════════════╗
   ║  MANIFEST — Khai báo danh sách file JSON                 ║
   ║                                                           ║
   ║  Để thêm sector mới:                                     ║
   ║    1. Upload file JSON vào cùng thư mục với index.html   ║
   ║    2. Thêm 1 object vào mảng MANIFEST bên dưới với:      ║
   ║         file     — tên file JSON (cùng thư mục)          ║
   ║         sector   — tên hiển thị tiếng Việt               ║
   ║         version  — ví dụ "v1", "v2"                      ║
   ║         positions — số vị trí (hiển thị trước khi load)  ║
   ║         skills   — số kĩ năng (hiển thị trước khi load)  ║
   ║                                                           ║
   ║  Không cần sửa bất kỳ dòng code nào khác.                ║
   ╚═══════════════════════════════════════════════════════════╝
════════════════════════════════════════════════════════════════ */
const MANIFEST = [
  { file: "BanLe_DVDoiSong_skill_taxonomy_v1.json",             sector: "Bán lẻ & Dịch vụ đời sống",          version: "v1", positions: 0,  skills: 0   },
  { file: "BatDongSan_skill_taxonomy_v1.json",                  sector: "Bất động sản",                       version: "v1", positions: 0,  skills: 0   },
  { file: "BienPhienDich_skill_taxonomy_v1.json",               sector: "Biên phiên dịch",                    version: "v1", positions: 11, skills: 97  },
  { file: "CS_VanHanh_skill_taxonomy_v1.json",                  sector: "Chăm sóc khách hàng & Vận hành",    version: "v1", positions: 0,  skills: 0   },
  { file: "DienDienTuVienThong_skill_taxonomy_v1.json",         sector: "Điện - Điện tử - Viễn thông",        version: "v1", positions: 0,  skills: 0   },
  { file: "DuocYTeSucKhoeCNSH_skill_taxonomy_v1.json",          sector: "Dược - Y tế - Sức khoẻ - CNSH",     version: "v1", positions: 0,  skills: 0   },
  { file: "Finance_Banking_Insurance_skill_taxonomy_v1.json",   sector: "Tài chính - Ngân hàng - Bảo hiểm",  version: "v1", positions: 0,  skills: 0   },
  { file: "GiaoDuc_DaoTao_skill_taxonomy_v1.json",              sector: "Giáo dục & Đào tạo",                 version: "v1", positions: 0,  skills: 0   },

  { file: "IT_skill_taxonomy_v4.json",                          sector: "Công nghệ thông tin (IT)",           version: "v4", positions: 70, skills: 1891},

                   soft:'Kĩ năng mềm', language:'Ngôn ngữ', certification:'Chứng chỉ', other:'Khác' };

                   awareness:'Nhận biết', expert:'Chuyên sâu', any:'' };
const VN_SHORT = { VN_DOMAIN:'VN-Lĩnh vực', VN_TOOL:'VN-Công cụ', VN_REGULATION:'VN-Quy định' };
const VN_FULL  = { VN_DOMAIN:'Lĩnh vực đặc thù VN', VN_TOOL:'Công cụ đặc thù VN',
                   VN_REGULATION:'Quy định pháp lý VN' };

const loadedData = new Array(MANIFEST.length).fill(null);

/* ────────────────────────────────────────────────────────────────
   THEME
──────────────────────────────────────────────────────────────── */
function toggleTheme() {
  const dark = document.body.getAttribute('data-theme') === 'dark';
  document.body.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('theme-ic').textContent = dark ? '◑' : '◐';
}

/* ────────────────────────────────────────────────────────────────
   NORMALIZE — chuẩn hóa từ raw JSON về cấu trúc thống nhất
──────────────────────────────────────────────────────────────── */
function normalize(raw, si) {
  const meta      = raw.taxonomy_metadata || {};
  const positions = (raw.positions || []).map(p => {
    const skills = (p.pipeline?.S1_extraction?.skills) || p.skills || [];
    return { vi_tri: p.vi_tri, nghe: p.nghe, nhom_nghe: p.nhom_nghe, skills };
  });
  const vnCount = meta.skills_with_vn_flag
    ?? positions.flatMap(p => p.skills).filter(s => s.iviec_flag).length;
  const certCount = meta.certifications_total
    ?? positions.flatMap(p => p.skills).filter(s => s.skill_type === 'certification').length;

  // Update manifest with real counts
  MANIFEST[si].positions = meta.total_positions ?? positions.length;
  MANIFEST[si].skills    = meta.total_skills    ?? positions.flatMap(p=>p.skills).length;

  return {
    positions,
    meta: {
      sector: meta.sector || MANIFEST[si].sector,
      version: meta.version || MANIFEST[si].version,
      total_positions: MANIFEST[si].positions,
      total_skills:    MANIFEST[si].skills,
      skill_type_distribution: meta.skill_type_distribution || {},
      iviec_flags:     meta.iviec_flags     || {},
      skills_with_vn_flag:  vnCount,
      certifications_total: certCount,
    }
  };
}

/* ────────────────────────────────────────────────────────────────
   LAZY LOAD — fetch JSON khi sector được mở lần đầu
──────────────────────────────────────────────────────────────── */
async function loadSector(si) {
  if (loadedData[si] && loadedData[si] !== 'loading') return loadedData[si];
  if (loadedData[si] === 'loading') {
    // wait until loaded
    return new Promise(res => {
      const iv = setInterval(() => {
        if (loadedData[si] && loadedData[si] !== 'loading') { clearInterval(iv); res(loadedData[si]); }
      }, 80);
    });
  }

  loadedData[si] = 'loading';
  showSecLoading(si);

  try {
    const url  = MANIFEST[si].file;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const raw  = await resp.json();
    const data = normalize(raw, si);
    loadedData[si] = data;
    renderSecBody(si, data);
    updateLandingCounts();
    return data;
  } catch (err) {
    loadedData[si] = null;
    showSecError(si, err.message);
    return null;
  }
}

function showSecLoading(si) {
  const body = document.getElementById('sbody-' + si);
  if (body) body.innerHTML = `
    <div class="sec-loading">
      <span class="spin">◌</span>
      <span>Đang tải...</span>
    </div>`;
}

function showSecError(si, msg) {
  const body = document.getElementById('sbody-' + si);
  if (body) body.innerHTML = `
    <div class="sec-error">
      ⚠ Lỗi tải file
      <span class="retry" onclick="retrySector(${si})">Thử lại</span>
    </div>`;
}

async function retrySector(si) {
  loadedData[si] = null;
  await loadSector(si);
}

/* ────────────────────────────────────────────────────────────────
   RENDER SECTOR BODY (L2 + L3) after data loaded
──────────────────────────────────────────────────────────────── */
function renderSecBody(si, data) {
  const body = document.getElementById('sbody-' + si);
  if (!body) return;

  // Group by nghe
  const ngheMap = {};
  data.positions.forEach(p => {
    if (!ngheMap[p.nghe]) ngheMap[p.nghe] = [];
    ngheMap[p.nghe].push(p);
  });

  body.innerHTML = Object.entries(ngheMap).map(([nghe, posList]) => {
    const ngheId = 'nghe_' + si + '_' + nghe.replace(/\W/g,'_');
    return `
      <div class="tree-nghe">
        <button class="tree-nghe-hdr" id="${ngheId}_hdr"
          onclick="toggleNghe('${ngheId}')">
          <span class="nghe-arrow">›</span>
          <span class="nghe-name">${nghe}</span>
          <span class="nghe-cnt">${posList.length}</span>
        </button>
        <div class="tree-nghe-body" id="${ngheId}_body">
          ${posList.map(p => `
            <button class="tree-vt-btn"
              data-si="${si}" data-id="${esc(p.vi_tri)}"
              onclick="selectVT(${si},'${esc(p.vi_tri)}',this)">
              <span class="vt-dot"></span>
              <span>${p.vi_tri}</span>
            </button>`).join('')}
        </div>
      </div>`;
  }).join('');

  // Re-open if there's a pending active vt
  if (currentVT && currentVT.si === si) {
    openNghePath(si, currentVT.viTri);
  }
}

function buildTree() {
  const tree = document.getElementById('sb-tree');
  tree.innerHTML = '';
  MANIFEST.forEach((m, si) => {

    el.className = 'tree-sector';
    const posLabel = m.positions ? `${m.positions} vị trí` : '—';
    const skLabel  = m.skills    ? ` · ${m.skills} kĩ năng` : '';
    el.innerHTML = `
      <button class="tree-sec-hdr" id="shdr-${si}" onclick="toggleSector(${si})">
        <span class="sec-arrow">›</span>
        <span class="sec-info">
          <span class="sec-name">${m.sector}</span>
          <span class="sec-meta" id="smeta-${si}">${posLabel}${skLabel}</span>
        </span>
        <span class="sec-count" id="scnt-${si}">${m.skills || '·'}</span>
      </button>
      <div class="tree-sec-body" id="sbody-${si}"></div>`;
    tree.appendChild(el);
  });
}

async function toggleSector(si) {
  const hdr  = document.getElementById('shdr-' + si);
  const body = document.getElementById('sbody-' + si);
  const opening = !body.classList.contains('open');

  body.classList.toggle('open', opening);
  hdr.classList.toggle('open', opening);
  hdr.classList.toggle('active-branch', opening);

  if (opening && !loadedData[si]) {
    await loadSector(si);
  }
}

function toggleNghe(ngheId) {
  const hdr  = document.getElementById(ngheId + '_hdr');
  const body = document.getElementById(ngheId + '_body');
  const open = body.classList.toggle('open');
  hdr.classList.toggle('open', open);
  hdr.classList.toggle('active-branch', open);
}

function openNghePath(si, viTri) {
  const data = loadedData[si];
  if (!data || data === 'loading') return;
  const pos = data.positions.find(p => p.vi_tri === viTri);
  if (!pos) return;
  const ngheId = 'nghe_' + si + '_' + pos.nghe.replace(/\W/g,'_');
  const nhdr = document.getElementById(ngheId + '_hdr');
  const nbody = document.getElementById(ngheId + '_body');
  if (nhdr && nbody) { nbody.classList.add('open'); nhdr.classList.add('open','active-branch'); }
}

function openSecPath(si) {
  const shdr  = document.getElementById('shdr-' + si);
  const sbody = document.getElementById('sbody-' + si);
  sbody.classList.add('open');
  shdr.classList.add('open','active-branch');
}

function updateTreeMeta(si) {
  const m    = MANIFEST[si];
  const meta = document.getElementById('smeta-' + si);
  const cnt  = document.getElementById('scnt-' + si);
  if (meta) meta.textContent = `${m.positions} vị trí · ${m.skills} kĩ năng`;
  if (cnt)  cnt.textContent  = m.skills || '·';
}

/* ────────────────────────────────────────────────────────────────
   SELECT POSITION
──────────────────────────────────────────────────────────────── */
async function selectVT(si, viTri, btnEl) {
  document.getElementById('srch').value = '';
  searchQ = '';
  document.getElementById('srch-cnt').textContent = '';

  document.querySelectorAll('.tree-vt-btn').forEach(b => b.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');

  currentVT = { si, viTri };

  // Ensure sector open
  openSecPath(si);

  // Ensure data loaded
  const data = await loadSector(si);
  if (!data) return;

  openNghePath(si, viTri);

  const pos = data.positions.find(p => p.vi_tri === viTri);
  if (!pos) return;

  clearMainViews();
  const id  = 'pd_' + si + '_' + viTri.replace(/\W/g,'_');
  let det   = document.getElementById(id);
  if (!det) { det = buildPosDetail(si, pos, data.meta, id); document.getElementById('pos-ct').appendChild(det); }
  det.classList.add('active');
  window.scrollTo(0, 0);
}

/* ────────────────────────────────────────────────────────────────
   BUILD POSITION DETAIL
──────────────────────────────────────────────────────────────── */
function buildPosDetail(si, pos, meta, id) {
  const skills = pos.skills || [];
  const tg = {}, rg = { required:[], preferred:[] }, tc = {};
  skills.forEach(s => {
    const t = s.skill_type||'other';
    (tg[t]||(tg[t]=[])).push(s);
    (s.requirement==='required'?rg.required:rg.preferred).push(s);
    tc[t]=(tc[t]||0)+1;
  });
  const vnSk = skills.filter(s=>s.iviec_flag);
  const el = document.createElement('div');
  el.className='pos-det'; el.id=id;
  el.innerHTML = `
    <div class="pos-hdr">
      <div class="pos-bc">
        <span>${meta.sector}</span><span class="sep">›</span><span>${pos.nghe}</span>
      </div>
      <div class="pos-title">${pos.vi_tri}</div>
      <div class="pos-chips">
        <span class="pchip tot">${skills.length} kĩ năng</span>
        <span class="pchip">Bắt buộc: ${rg.required.length}</span>
        <span class="pchip">Ưu tiên: ${rg.preferred.length}</span>
        ${vnSk.length?`<span class="pchip vn">Đặc thù VN: ${vnSk.length}</span>`:''}
      </div>
    </div>
    <div class="frow" id="fr-${id}">
      <button class="ftab active" onclick="filterPos('${id}','all',this)">Tất cả <span class="cn">${skills.length}</span></button>
      <button class="ftab" onclick="filterPos('${id}','required',this)">Bắt buộc <span class="cn">${rg.required.length}</span></button>
      <button class="ftab" onclick="filterPos('${id}','preferred',this)">Ưu tiên <span class="cn">${rg.preferred.length}</span></button>
      ${vnSk.length?`<button class="ftab" onclick="filterPos('${id}','vn',this)">Đặc thù VN <span class="cn">${vnSk.length}</span></button>`:''}
      ${TYPE_ORDER.filter(t=>tg[t]).map(t=>
        `<button class="ftab" onclick="filterPos('${id}','${t}',this)">${TYPE_VI[t]||t} <span class="cn">${tc[t]}</span></button>`
      ).join('')}
    </div>
    <div id="sc-${id}">
      ${TYPE_ORDER.filter(t=>tg[t]).map(t=>`
        <div class="sk-grp" data-type="${t}">
          <div class="sg-lbl">${TYPE_VI[t]||t} (${tg[t].length})</div>
          <div class="sk-grid">${tg[t].map(renderCard).join('')}</div>
        </div>`).join('')}
      ${tg.other?`<div class="sk-grp" data-type="other">
        <div class="sg-lbl">Khác (${tg.other.length})</div>
        <div class="sk-grid">${tg.other.map(renderCard).join('')}</div>
      </div>`:''}
    </div>`;
  return el;
}

function renderCard(s) {
  const req  = s.requirement||'preferred';
  const type = s.skill_type||'other';
  const isVN = !!s.iviec_flag;
  const prof = s.proficiency_level && s.proficiency_level!=='any' ? PROF_VI[s.proficiency_level]||s.proficiency_level : '';
  return `
    <div class="sk-card ${req}" data-req="${req}" data-type="${type}" data-vn="${isVN}">
      <div class="sk-nm">${s.label_vi||s.label_en}${isVN?`<span class="vn-badge">${VN_SHORT[s.iviec_flag]||s.iviec_flag}</span>`:''}</div>
      <div class="sk-tags">
        <span class="sk-tag req-${req}">${REQ_VI[req]||req}</span>
        <span class="sk-tag">${TYPE_VI[type]||type}</span>
        ${prof?`<span class="sk-tag">${prof}</span>`:''}
      </div>
      ${s.evidence_text?`<div class="sk-ev">${s.evidence_text}</div>`:''}
    </div>`;
}

function filterPos(posId, filter, btn) {
  document.querySelectorAll(`#fr-${posId} .ftab`).forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const ct    = document.getElementById('sc-'+posId);
  const cards = ct.querySelectorAll('.sk-card');
  const grps  = ct.querySelectorAll('.sk-grp');
  if (filter==='all') { cards.forEach(c=>c.classList.remove('hidden')); grps.forEach(g=>g.classList.remove('hidden')); return; }
  cards.forEach(c=>{
    const show = (filter==='required'||filter==='preferred') ? c.dataset.req===filter
               : filter==='vn' ? c.dataset.vn==='true'
               : c.dataset.type===filter;
    c.classList.toggle('hidden',!show);
  });
  grps.forEach(g=>g.classList.toggle('hidden',!g.querySelectorAll('.sk-card:not(.hidden)').length));
}

/* ────────────────────────────────────────────────────────────────
   SEARCH — chỉ search các sector đã được load
──────────────────────────────────────────────────────────────── */
function handleSearch(val) {
  searchQ = val.trim().toLowerCase();
  document.getElementById('srch-cnt').textContent = '';
  if (!searchQ) {
    document.getElementById('sr-view').classList.remove('active');
    currentVT ? (() => {
      const id = 'pd_'+currentVT.si+'_'+currentVT.viTri.replace(/\W/g,'_');
      clearMainViews();
      document.getElementById(id)?.classList.add('active');
    })() : showLanding();
    return;
  }
  clearMainViews();

  const loaded = loadedData
    .map((d,si)=>({d,si}))
    .filter(({d})=>d && d!=='loading');

  // Collect results from loaded sectors
  const results = [];
  loaded.forEach(({d,si})=>{
    (d.positions||[]).forEach(p=>{
      (p.skills||[]).forEach(s=>{
        if ((s.label_en||'').toLowerCase().includes(searchQ) ||
            (s.label_vi||'').toLowerCase().includes(searchQ)) {
          results.push({...s, _pos:p, _si:si, _sector:MANIFEST[si].sector});
        }
      });
    });
  });

  const loadedSectorCount = loaded.length;
  const totalSectors = MANIFEST.length;
  document.getElementById('srch-cnt').textContent = `${results.length} kết quả (${loadedSectorCount}/${totalSectors} sector đã tải)`;
  renderSearch(results, loadedSectorCount, totalSectors);
}

function renderSearch(results, loadedCount, totalCount) {
  const view = document.getElementById('sr-view');
  view.classList.add('active');
  document.getElementById('sr-sub').textContent =
    `${results.length} kĩ năng · đã tìm trong ${loadedCount}/${totalCount} sector`;

  if (!results.length) {
    document.getElementById('sr-list').innerHTML =
      `<div class="no-res"><div class="ico">◇</div><p>Không tìm thấy kết quả trong các sector đã tải.</p></div>`;
    return;
  }

  const map = {};
  results.forEach(s=>{
    const k=s.label_en||s.label_vi;
    if(!map[k]) map[k]={vi:s.label_vi,en:s.label_en,type:s.skill_type,flag:s.iviec_flag,hits:[]};
    map[k].hits.push({si:s._si,sector:s._sector,vt:s._pos.vi_tri,req:s.requirement});
  });

  document.getElementById('sr-list').innerHTML = Object.entries(map).map(([,it])=>`
    <div class="sri">
      <div class="sri-nm">${hl(it.vi||it.en)}</div>
      <div class="sri-en">${hl(it.en||'')}</div>
      <div class="sri-meta">
        ${it.hits.map(h=>`
          <span class="sri-chip pos ${h.req==='required'?'req':''}"
            onclick="jumpToPos(${h.si},'${esc(h.vt)}')">
            ${h.sector} · ${h.vt}
          </span>`).join('')}
        <span class="sri-chip">${TYPE_VI[it.type]||it.type||''}</span>
        ${it.flag?`<span class="sri-chip vn">${VN_SHORT[it.flag]||it.flag}</span>`:''}
      </div>
    </div>`).join('');
}

function hl(text) {
  if(!text) return '';
  const re=new RegExp(`(${searchQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');
  return text.replace(re,'<mark style="background:var(--acc);color:var(--acc-i);border-radius:1px;padding:0 1px">$1</mark>');
}

async function jumpToPos(si, viTri) {
  document.getElementById('srch').value='';
  handleSearch('');
  openSecPath(si);
  const btn = document.querySelector(`.tree-vt-btn[data-si="${si}"][data-id="${viTri}"]`);
  await selectVT(si, viTri, btn);
}

/* ────────────────────────────────────────────────────────────────
   HELPERS
──────────────────────────────────────────────────────────────── */
function esc(s){return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}

function clearMainViews() {
  document.getElementById('landing').style.display='none';
  document.getElementById('sr-view').classList.remove('active');
  document.querySelectorAll('.pos-det').forEach(e=>e.classList.remove('active'));
}

/* ────────────────────────────────────────────────────────────────
   INIT
──────────────────────────────────────────────────────────────── */
buildTree();
showLanding();
</script>
