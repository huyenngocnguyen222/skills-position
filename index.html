<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Taxonomy Visualizer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

/* RESET */
*{box-sizing:border-box;margin:0;padding:0}

:root{
--bg:#0d0d0d;
--bg2:#141414;
--border:#2a2a2a;
--text:#f0f0f0;
--text2:#aaa;
--text3:#666;

--accent:#fff;
--accent-dim:rgba(255,255,255,0.08);
--accent-dim2:rgba(255,255,255,0.04);

--sector-w:240px;
--sidebar-w:240px;
}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
color:var(--text);
display:flex;
flex-direction:column;
height:100vh;
font-size:13px
}

/* TOPBAR */

.topbar{
height:52px;
background:var(--bg2);
border-bottom:1px solid var(--border);
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
}

.topbar-logo h1{
font-size:14px;
font-weight:600
}

.topbar-logo span{
font-size:11px;
color:var(--text3);
font-family:'JetBrains Mono',monospace
}

.topbar-stats{
display:flex
}

.tstat{
padding:0 18px;
text-align:center;
border-left:1px solid var(--border)
}

.tstat .n{
font-size:16px;
font-weight:600;
font-family:'JetBrains Mono',monospace
}

.tstat .l{
font-size:9px;
color:var(--text3)
}

/* LAYOUT */

.shell{
display:flex;
flex:1;
overflow:hidden
}

.sector-panel{
width:var(--sector-w);
background:var(--bg2);
border-right:1px solid var(--border);
overflow-y:auto;
padding:16px 0
}

.nghe-panel{
width:var(--sidebar-w);
background:var(--bg2);
border-right:1px solid var(--border);
overflow-y:auto;
padding:16px 0
}

.content{
flex:1;
overflow-y:auto;
padding:24px
}

/* ITEMS */

.panel-title{
font-size:9px;
color:var(--text3);
padding:0 16px 10px
}

.sector-item,.nghe-item{
padding:8px 16px;
cursor:pointer;
display:flex;
justify-content:space-between
}

.sector-item:hover,.nghe-item:hover{
background:var(--accent-dim2)
}

.sector-item.active,.nghe-item.active{
background:var(--accent-dim)
}

.pcard{
border:1px solid var(--border);
border-radius:8px;
margin-bottom:10px
}

.phead{
padding:12px;
display:flex;
justify-content:space-between;
cursor:pointer
}

.spanel{
display:none;
padding:12px
}

.pcard.open .spanel{
display:block
}

.chip{
border:1px solid var(--border);
padding:3px 8px;
border-radius:3px;
margin:2px;
display:inline-block;
font-size:11px
}

/* LIGHT MODE */

body.light{
--bg:#ffffff;
--bg2:#f5f5f5;
--border:#e5e5e5;
--text:#111;
--text2:#444;
--text3:#888;
--accent:#111;
--accent-dim:rgba(0,0,0,0.08);
--accent-dim2:rgba(0,0,0,0.04);
}

</style>
</head>

<body>

<header class="topbar">

<div class="topbar-logo">
<h1>Skill Taxonomy</h1>
<span>Vietnam Job Market · iViec Research</span>
</div>

<div style="display:flex;align-items:center;gap:12px">
<span style="font-size:11px;color:#888;font-family:JetBrains Mono">
ver 1.0 · latest update: 04/03/2026
</span>

<button id="themeToggle"
style="border:1px solid var(--border);background:var(--bg2);color:var(--text);
padding:4px 10px;border-radius:5px;cursor:pointer;font-size:11px">

🌙/☀
</button>
</div>

<div class="topbar-stats">
<div class="tstat"><div class="n" id="sFiles">0</div><div class="l">Ngành</div></div>
<div class="tstat"><div class="n" id="sPos">0</div><div class="l">Vị trí</div></div>
<div class="tstat"><div class="n" id="sSkills">0</div><div class="l">Skills</div></div>
</div>

</header>

<div class="shell">

<nav class="sector-panel" id="sectorPanel">
<div class="panel-title">Ngành</div>
</nav>

<nav class="nghe-panel">
<div class="panel-title">Nhóm nghề</div>
<div id="ngheList"></div>
</nav>

<main class="content" id="content">
<div>Đang tải...</div>
</main>

</div>

<script>

/* JSON FILES */

var JSON_FILES=[
'IT_skill_taxonomy_v1.json'
];

var datasets=[];
var activeSector=0;
var activeNghe="__all__";

/* LOAD JSON */

function loadAll(){

var pending=JSON_FILES.length;

JSON_FILES.forEach(function(f){

fetch(f)
.then(r=>r.json())
.then(json=>datasets.push(json))
.finally(()=>{

if(--pending===0) boot();

});

});

}

/* BOOT */

function boot(){

updateStats();

renderSectorPanel();

renderNghePanel();

renderOverview(datasets[0]);

}

/* STATS */

function updateStats(){

var pos=0,skills=0;

datasets.forEach(d=>{
pos+=d.positions.length
skills+=d.taxonomy_metadata.total_skills_extracted||0
});

sFiles.textContent=datasets.length
sPos.textContent=pos
sSkills.textContent=skills

}

/* SECTOR */

function renderSectorPanel(){

var panel=document.getElementById("sectorPanel");

panel.innerHTML='<div class="panel-title">Ngành</div>';

datasets.forEach((ds,i)=>{

var el=document.createElement("div")

el.className="sector-item"

el.innerHTML=

'<span>'+ds.taxonomy_metadata.job_group+'</span>'+

'<span>'+ds.positions.length+'</span>'

el.onclick=()=>{

activeSector=i
renderNghePanel()
renderOverview(ds)

}

panel.appendChild(el)

})

}

/* NGHE */

function renderNghePanel(){

var ds=datasets[activeSector]

var list=document.getElementById("ngheList")

list.innerHTML=""

ds.nghes.forEach(n=>{

var el=document.createElement("div")

el.className="nghe-item"

el.innerHTML=

'<span>'+n.nghe+'</span>'+

'<span>'+n.position_count+'</span>'

el.onclick=()=>{

activeNghe=n.nghe

renderPositions(

ds.positions.filter(p=>p.nghe===n.nghe)

)

}

list.appendChild(el)

})

}

/* OVERVIEW */

function renderOverview(ds){

content.innerHTML=

'<h2>'+ds.taxonomy_metadata.job_group+'</h2>'+

'<p>'+ds.positions.length+' positions</p>'

}

/* POSITIONS */

function renderPositions(pos){

content.innerHTML=""

pos.forEach(p=>{

var el=document.createElement("div")

el.className="pcard"

el.innerHTML=

'<div class="phead">'+

'<div>'+p.vi_tri+'</div>'+

'<div>'+skillsOf(p).length+' skills</div>'+

'</div>'+

'<div class="spanel">'+

skillsOf(p).map(s=>'<span class="chip">'+(s.label_vi||s.label_en)+'</span>').join('')+

'</div>'

el.querySelector(".phead").onclick=()=>{

el.classList.toggle("open")

}

content.appendChild(el)

})

}

/* SKILL EXTRACTOR (FIXED VERSION) */

function skillsOf(pos){

if(pos.pipeline?.S1_extraction?.skills)
return pos.pipeline.S1_extraction.skills

if(pos.pipeline?.skills)
return pos.pipeline.skills

if(pos.skills)
return pos.skills

return[]

}

/* THEME */

themeToggle.onclick=()=>{

document.body.classList.toggle("light")

}

/* INIT */

loadAll()

</script>

</body>
</html>
