<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Taxonomy — Phân loại kĩ năng nghề</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════ */
:root {
  /* Light */
  --bg:       #f4f3f0;
  --bg2:      #eceae6;
  --bg3:      #e0deda;
  --sur:      #ffffff;
  --sur2:     #faf9f7;
  --brd:      #dddbd7;
  --brd2:     #b0ada8;
  --tx1:      #1a1917;
  --tx2:      #4a4845;
  --txm:      #9a9895;
  --acc:      #1a1917;
  --acc-i:    #f4f3f0;
  --acc-s:    rgba(26,25,23,.06);
  --acc-s2:   rgba(26,25,23,.10);
  --vn-bg:    #f0ede8;
  --vn-c:     #6b4c2a;
  --vn-brd:   #d4c4b0;
  --sh:       0 1px 2px rgba(0,0,0,.05), 0 4px 16px rgba(0,0,0,.04);
  --shm:      0 2px 8px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.05);
  --r:        4px;
  --tr:       150ms ease;
  --sbW:      300px;
  --topH:     50px;
}
[data-theme=dark] {
  --bg:       #131211;
  --bg2:      #1d1c1a;
  --bg3:      #272522;
  --sur:      #1d1c1a;
  --sur2:     #222120;
  --brd:      #2e2c29;
  --brd2:     #524f4a;
  --tx1:      #eeece8;
  --tx2:      #a8a5a0;
  --txm:      #635f5a;
  --acc:      #eeece8;
  --acc-i:    #131211;
  --acc-s:    rgba(238,236,232,.06);
  --acc-s2:   rgba(238,236,232,.10);
  --vn-bg:    #2a2219;
  --vn-c:     #d4aa78;
  --vn-brd:   #4a3a28;
  --sh:       0 1px 2px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.2);
  --shm:      0 2px 8px rgba(0,0,0,.4), 0 8px 24px rgba(0,0,0,.3);
}

/* ═══════════════════════════════════════════════
   BASE
═══════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; -webkit-font-smoothing: antialiased; }
body {
  font-family: "DM Sans", sans-serif;
  background: var(--bg); color: var(--tx1);
  display: flex; flex-direction: column; min-height: 100vh;
  transition: background var(--tr), color var(--tr);
}
button { cursor: pointer; font-family: inherit; border: none; background: none; }

/* ═══════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════ */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--topH);
  background: var(--sur); border-bottom: 1px solid var(--brd);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px 0 0; z-index: 300; box-shadow: var(--sh);
}
.top-brand {
  width: var(--sbW); height: 100%;
  display: flex; align-items: center; gap: 10px; padding: 0 16px;
  border-right: 1px solid var(--brd);
  flex-shrink: 0;
}
.brand-name {
  font-family: "DM Mono", monospace; font-size: 11px; font-weight: 500;
  letter-spacing: .1em; text-transform: uppercase; color: var(--tx1);
  white-space: nowrap;
}
.brand-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--acc); flex-shrink: 0; }
.top-right { display: flex; align-items: center; gap: 8px; padding-left: 16px; }
.top-meta {
  font-family: "DM Mono", monospace; font-size: 9px;
  color: var(--txm); letter-spacing: .06em; line-height: 1.5; text-align: right;
}
.btn-ic {
  width: 30px; height: 30px; border: 1px solid var(--brd);
  background: var(--bg2); color: var(--tx1); border-radius: var(--r);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; transition: all var(--tr);
}
.btn-ic:hover { background: var(--bg3); border-color: var(--brd2); }

/* ═══════════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════════ */
.shell { display: flex; margin-top: var(--topH); min-height: calc(100vh - var(--topH)); }

/* ═══════════════════════════════════════════════
   SIDEBAR  — 3-level tree: Sector › Ngành › Vị trí
═══════════════════════════════════════════════ */
.sidebar {
  width: var(--sbW); flex-shrink: 0;
  background: var(--sur);
  border-right: 1px solid var(--brd);
  position: fixed; top: var(--topH); left: 0; bottom: 0;
  overflow-y: auto; overflow-x: hidden; z-index: 200;
  display: flex; flex-direction: column;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--brd); border-radius: 2px; }

/* Search */
.sb-search {
  padding: 10px;
  border-bottom: 1px solid var(--brd);
  position: sticky; top: 0; background: var(--sur); z-index: 10;
}
.sb-search-inner { position: relative; }
.sb-search-ico {
  position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
  color: var(--txm); font-size: 12px; pointer-events: none;
}
.sb-input {
  width: 100%; padding: 7px 8px 7px 28px;
  background: var(--bg2); border: 1px solid var(--brd);
  border-radius: var(--r); color: var(--tx1);
  font-family: "DM Sans", sans-serif; font-size: 12px;
  outline: none; transition: all var(--tr);
}
.sb-input:focus { border-color: var(--brd2); background: var(--sur); }
.sb-input::placeholder { color: var(--txm); }
.sb-search-cnt {
  font-family: "DM Mono", monospace; font-size: 9px;
  color: var(--txm); margin-top: 5px; min-height: 13px;
}

/* Tree */
.sb-tree { flex: 1; padding: 8px 0 24px; }

/* ── LEVEL 1: Sector ── */
.tree-sector { margin-bottom: 2px; }

.tree-sector-hdr {
  width: 100%; text-align: left;
  padding: 7px 12px 7px 14px;
  display: flex; align-items: center; gap: 8px;
  border-left: 3px solid transparent;
  transition: all var(--tr);
}
.tree-sector-hdr:hover { background: var(--acc-s); }
.tree-sector-hdr.open { border-left-color: var(--brd2); }
.tree-sector-hdr.active-branch { border-left-color: var(--acc); }

.sec-arrow {
  width: 14px; height: 14px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: var(--txm);
  transition: transform var(--tr);
}
.tree-sector-hdr.open .sec-arrow { transform: rotate(90deg); }

.sec-label-wrap { flex: 1; min-width: 0; }
.sec-name {
  font-size: 12px; font-weight: 700; color: var(--tx1);
  letter-spacing: .01em; line-height: 1.2;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sec-ver {
  font-family: "DM Mono", monospace; font-size: 8.5px;
  color: var(--txm); letter-spacing: .07em; margin-top: 1px;
}
.sec-badge {
  font-family: "DM Mono", monospace; font-size: 8px;
  padding: 2px 5px; border-radius: 2px;
  background: var(--bg2); color: var(--txm);
  border: 1px solid var(--brd); letter-spacing: .05em;
  flex-shrink: 0;
}
.tree-sector-hdr.active-branch .sec-badge {
  background: var(--acc); color: var(--acc-i); border-color: var(--acc);
}

.tree-sector-body { display: none; }
.tree-sector-body.open { display: block; }

/* ── LEVEL 2: Ngành ── */
.tree-nghe { }
.tree-nghe-hdr {
  width: 100%; text-align: left;
  padding: 5px 12px 5px 30px;
  display: flex; align-items: center; gap: 6px;
  border-left: 3px solid transparent;
  transition: all var(--tr);
}
.tree-nghe-hdr:hover { background: var(--acc-s); }
.tree-nghe-hdr.active-branch { border-left-color: var(--brd2); }

.nghe-arrow {
  font-size: 8.5px; color: var(--txm); flex-shrink: 0;
  transition: transform var(--tr); width: 12px;
}
.tree-nghe-hdr.open .nghe-arrow { transform: rotate(90deg); }

.nghe-name {
  font-size: 11.5px; font-weight: 500; color: var(--tx2);
  flex: 1; line-height: 1.3;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tree-nghe-hdr.active-branch .nghe-name { color: var(--tx1); }
.nghe-cnt {
  font-family: "DM Mono", monospace; font-size: 8.5px;
  color: var(--txm); flex-shrink: 0;
}

.tree-nghe-body { display: none; }
.tree-nghe-body.open { display: block; }

/* ── LEVEL 3: Vị trí ── */
.tree-vt-btn {
  width: 100%; text-align: left;
  padding: 4px 12px 4px 46px;
  display: flex; align-items: center; gap: 6px;
  border-left: 3px solid transparent;
  transition: all var(--tr); color: var(--txm);
  font-size: 11px;
}
.tree-vt-btn:hover { background: var(--acc-s); color: var(--tx2); }
.tree-vt-btn.active {
  background: var(--acc-s2); color: var(--tx1);
  border-left-color: var(--acc); font-weight: 600;
}
.vt-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--brd2); flex-shrink: 0;
  transition: background var(--tr);
}
.tree-vt-btn.active .vt-dot { background: var(--acc); }
.vt-name { flex: 1; line-height: 1.3; }

/* ═══════════════════════════════════════════════
   MAIN CONTENT
═══════════════════════════════════════════════ */
.main {
  margin-left: var(--sbW); flex: 1;
  padding: 32px 40px; min-width: 0;
}

/* ═══════════════════════════════════════════════
   LANDING PAGE
═══════════════════════════════════════════════ */
.landing { display: block; }

.land-header { margin-bottom: 28px; }
.land-eyebrow {
  font-family: "DM Mono", monospace; font-size: 9.5px;
  letter-spacing: .14em; text-transform: uppercase;
  color: var(--txm); margin-bottom: 8px;
}
.land-title {
  font-family: "Instrument Serif", serif;
  font-size: 38px; line-height: 1.1; letter-spacing: -.02em;
  color: var(--tx1); margin-bottom: 10px;
}
.land-desc { font-size: 13px; color: var(--tx2); line-height: 1.65; max-width: 540px; }

/* Summary cards */
.sum-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 8px; margin-bottom: 28px;
}
.sum-card {
  background: var(--sur); border: 1px solid var(--brd);
  border-radius: var(--r); padding: 16px 18px;
  transition: all var(--tr);
}
.sum-card:hover { border-color: var(--brd2); box-shadow: var(--shm); }
.sum-card.hi { background: var(--acc); border-color: var(--acc); }
.s-num {
  font-family: "DM Mono", monospace; font-size: 28px; font-weight: 500;
  letter-spacing: -.03em; line-height: 1; color: var(--tx1); margin-bottom: 5px;
}
.sum-card.hi .s-num { color: var(--acc-i); }
.s-lbl { font-size: 11px; color: var(--txm); }
.sum-card.hi .s-lbl { color: var(--acc-i); opacity: .7; }
.s-sub { font-family: "DM Mono", monospace; font-size: 8.5px; color: var(--txm); margin-top: 3px; }
.sum-card.hi .s-sub { color: var(--acc-i); opacity: .45; }

/* Distribution */
.dist-block { margin-top: 22px; }
.dist-hdr {
  font-family: "DM Mono", monospace; font-size: 8.5px;
  text-transform: uppercase; letter-spacing: .18em;
  color: var(--txm); margin-bottom: 10px;
  display: flex; align-items: center; gap: 10px;
}
.dist-hdr::after { content: ''; flex: 1; height: 1px; background: var(--brd); }
.dist-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 6px; }
.dist-item {
  background: var(--sur); border: 1px solid var(--brd);
  border-radius: var(--r); padding: 10px 12px;
}
.dist-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 6px; }
.dist-nm { font-size: 12px; color: var(--tx2); }
.dist-vl { font-family: "DM Mono", monospace; font-size: 12px; color: var(--tx1); font-weight: 500; }
.bar-bg { height: 2px; background: var(--bg3); border-radius: 1px; }
.bar-fill { height: 2px; background: var(--acc); border-radius: 1px; transition: width .4s ease; }

/* Sector overview chips */
.sector-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 28px; }
.sector-chip {
  display: flex; align-items: center; gap: 8px;
  background: var(--sur); border: 1px solid var(--brd);
  border-radius: var(--r); padding: 10px 14px;
  cursor: pointer; transition: all var(--tr);
}
.sector-chip:hover { border-color: var(--brd2); box-shadow: var(--sh); }
.sc-name { font-size: 13px; font-weight: 600; color: var(--tx1); }
.sc-ver {
  font-family: "DM Mono", monospace; font-size: 8.5px;
  background: var(--bg2); color: var(--txm); padding: 2px 5px;
  border-radius: 2px; border: 1px solid var(--brd);
}
.sc-stats { font-family: "DM Mono", monospace; font-size: 9px; color: var(--txm); }

/* ═══════════════════════════════════════════════
   POSITION DETAIL
═══════════════════════════════════════════════ */
.pos-det { display: none; }
.pos-det.active { display: block; }

.pos-hdr {
  margin-bottom: 22px; padding-bottom: 20px;
  border-bottom: 1px solid var(--brd);
}
.pos-bc {
  font-family: "DM Mono", monospace; font-size: 9px;
  color: var(--txm); letter-spacing: .07em; margin-bottom: 8px;
  display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
}
.pos-bc .sep { opacity: .35; }
.pos-title {
  font-family: "Instrument Serif", serif;
  font-size: 30px; line-height: 1.15; letter-spacing: -.01em;
  color: var(--tx1); margin-bottom: 12px;
}
.pos-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.pchip {
  font-family: "DM Mono", monospace; font-size: 9px;
  padding: 3px 8px; border-radius: 2px;
  border: 1px solid var(--brd); color: var(--tx2); letter-spacing: .05em;
}
.pchip.tot { background: var(--acc); color: var(--acc-i); border-color: var(--acc); }
.pchip.vn { background: var(--vn-bg); color: var(--vn-c); border-color: var(--vn-brd); }

/* Filter row */
.frow { display: flex; gap: 4px; margin-bottom: 18px; flex-wrap: wrap; }
.ftab {
  font-family: "DM Mono", monospace; font-size: 9px; letter-spacing: .07em;
  text-transform: uppercase; padding: 4px 9px; border-radius: 2px;
  border: 1px solid var(--brd); color: var(--txm); transition: all var(--tr);
}
.ftab:hover { border-color: var(--brd2); color: var(--tx2); }
.ftab.active { background: var(--acc); color: var(--acc-i); border-color: var(--acc); }
.ftab .cn { opacity: .55; margin-left: 2px; }

/* Skill groups */
.sk-grp { margin-bottom: 24px; }
.sg-lbl {
  font-family: "DM Mono", monospace; font-size: 8.5px;
  text-transform: uppercase; letter-spacing: .18em; color: var(--txm);
  margin-bottom: 9px; display: flex; align-items: center; gap: 8px;
}
.sg-lbl::after { content: ''; flex: 1; height: 1px; background: var(--brd); }

.sk-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(272px, 1fr)); gap: 6px; }

.sk-card {
  background: var(--sur); border: 1px solid var(--brd);
  border-radius: var(--r); padding: 11px 13px;
  transition: all var(--tr); position: relative; overflow: hidden;
}
.sk-card::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
}
.sk-card.required::before { background: var(--acc); }
.sk-card.preferred::before { background: var(--brd2); }
.sk-card:hover { border-color: var(--brd2); box-shadow: var(--shm); }

.sk-nm {
  font-size: 12.5px; font-weight: 600; color: var(--tx1);
  line-height: 1.35; margin-bottom: 6px;
}
.vn-badge {
  display: inline-block; font-family: "DM Mono", monospace; font-size: 7.5px;
  background: var(--vn-bg); color: var(--vn-c); padding: 1px 4px;
  border-radius: 2px; margin-left: 5px; vertical-align: middle;
  border: 1px solid var(--vn-brd); letter-spacing: .04em;
}
.sk-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 6px; }
.sk-tag {
  font-family: "DM Mono", monospace; font-size: 8px;
  padding: 2px 5px; border-radius: 1px;
  border: 1px solid var(--brd); color: var(--txm); letter-spacing: .03em;
}
.sk-tag.req-required { background: var(--acc); color: var(--acc-i); border-color: var(--acc); }
.sk-tag.req-preferred { border-color: var(--brd2); color: var(--tx2); }
.sk-ev {
  font-size: 10.5px; color: var(--txm); font-style: italic; line-height: 1.55;
  border-top: 1px solid var(--brd); padding-top: 7px; display: none;
}
.sk-card:hover .sk-ev { display: block; }

/* ═══════════════════════════════════════════════
   SEARCH RESULTS
═══════════════════════════════════════════════ */
.sr-view { display: none; }
.sr-view.active { display: block; }
.sr-hdr { margin-bottom: 18px; padding-bottom: 14px; border-bottom: 1px solid var(--brd); }
.sr-title { font-family: "Instrument Serif", serif; font-size: 26px; letter-spacing: -.01em; margin-bottom: 4px; }
.sr-sub { font-family: "DM Mono", monospace; font-size: 9.5px; color: var(--txm); }

.sri {
  background: var(--sur); border: 1px solid var(--brd);
  border-radius: var(--r); padding: 11px 13px; margin-bottom: 6px;
  transition: all var(--tr); border-left: 3px solid transparent;
}
.sri:hover { border-color: var(--brd2); border-left-color: var(--acc); box-shadow: var(--sh); }
.sri-nm { font-size: 13px; font-weight: 600; color: var(--tx1); margin-bottom: 2px; }
.sri-en { font-size: 10.5px; color: var(--txm); margin-bottom: 7px; }
.sri-meta { display: flex; flex-wrap: wrap; gap: 4px; }
.sri-chip {
  font-family: "DM Mono", monospace; font-size: 8.5px;
  padding: 2px 6px; border-radius: 1px;
  border: 1px solid var(--brd); color: var(--txm);
  letter-spacing: .03em;
}
.sri-chip.pos { cursor: pointer; transition: all var(--tr); }
.sri-chip.pos:hover { border-color: var(--brd2); color: var(--tx1); background: var(--acc-s); }
.sri-chip.req { background: var(--acc); color: var(--acc-i); border-color: var(--acc); }
.sri-chip.vn { background: var(--vn-bg); color: var(--vn-c); border-color: var(--vn-brd); }

.no-res { text-align: center; padding: 80px 20px; color: var(--txm); }
.no-res .ico { font-size: 32px; opacity: .2; margin-bottom: 12px; }
.no-res p { font-size: 13px; }

.hidden { display: none !important; }
</style>
</head>
<body data-theme="light">

<!-- TOP BAR -->
<header class="topbar">
  <div class="top-brand">
    <span class="brand-dot"></span>
    <span class="brand-name">Skill Taxonomy</span>
  </div>
  <div class="top-right">
    <div class="top-meta">v1 &nbsp;·&nbsp; Cập nhật 04/03/2026</div>
    <button class="btn-ic" onclick="toggleTheme()" title="Đổi giao diện">
      <span id="theme-ic">◑</span>
    </button>
  </div>
</header>

<div class="shell">
  <!-- ═══ SIDEBAR ═══ -->
  <aside class="sidebar">
    <!-- Search -->
    <div class="sb-search">
      <div class="sb-search-inner">
        <span class="sb-search-ico">⌕</span>
        <input class="sb-input" id="srch" type="text"
          placeholder="Tìm kĩ năng..." autocomplete="off"
          oninput="handleSearch(this.value)">
      </div>
      <div class="sb-search-cnt" id="srch-cnt"></div>
    </div>

    <!-- 3-level tree -->
    <div class="sb-tree" id="sb-tree"></div>
  </aside>

  <!-- ═══ MAIN ═══ -->
  <main class="main">
    <!-- Landing -->
    <div class="landing" id="landing"></div>

    <!-- Search results -->
    <div class="sr-view" id="sr-view">
      <div class="sr-hdr">
        <div class="sr-title">Kết quả tìm kiếm</div>
        <div class="sr-sub" id="sr-sub"></div>
      </div>
      <div id="sr-list"></div>
    </div>

    <!-- Position details (rendered on demand, cached) -->
    <div id="pos-ct"></div>
  </main>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════════
   ██████╗  █████╗ ████████╗ █████╗
   ██╔══██╗██╔══██╗╚══██╔══╝██╔══██╗
   ██║  ██║███████║   ██║   ███████║
   ██║  ██║██╔══██║   ██║   ██╔══██║
   ██████╔╝██║  ██║   ██║   ██║  ██║
   ╚═════╝ ╚═╝  ╚═╝   ╚═╝   ╚═╝  ╚═╝

   ┌─────────────────────────────────────────────────────────────┐
   │  DATASETS — thêm/bỏ file JSON tại đây                      │
   │                                                             │

function toggleTheme() {
  const dark = document.body.getAttribute('data-theme') === 'dark';
  document.body.setAttribute('data-theme', dark ? 'light' : 'dark');
  document.getElementById('theme-ic').textContent = dark ? '◑' : '◐';

/* ────────────────────────────────────────────────────────────────
   HELPERS
──────────────────────────────────────────────────────────────── */
function esc(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function allSkillsFlat(sectorIdx) {
  // If sectorIdx given, search only that sector; else search all
  const datasets = sectorIdx != null ? [DATASETS[sectorIdx]] : DATASETS;
  return datasets.flatMap((ds, relIdx) => {
    const si = sectorIdx != null ? sectorIdx : relIdx;
    return (ds.positions||[]).flatMap(p =>
      (p.skills||[]).map(s => ({ ...s, _pos: p, _si: si, _sector: ds.sector }))
    );
  });
}

/* ────────────────────────────────────────────────────────────────
   BUILD SIDEBAR TREE
   Structure: Sector (L1) › Ngành/nghe (L2) › Vị trí (L3)
──────────────────────────────────────────────────────────────── */
function buildTree() {
  const tree = document.getElementById('sb-tree');
  tree.innerHTML = '';

  DATASETS.forEach((ds, si) => {
    // Group positions by nghe
    const ngheMap = {};
    (ds.positions||[]).forEach(p => {
      if (!ngheMap[p.nghe]) ngheMap[p.nghe] = [];
      ngheMap[p.nghe].push(p);
    });

    const sectorId = 'sec_' + si;
    const secEl = document.createElement('div');
    secEl.className = 'tree-sector';
    secEl.dataset.si = si;

    // L1 header
    secEl.innerHTML = `
      <button class="tree-sector-hdr" id="shdr-${si}"
        onclick="toggleSector(${si})">
        <span class="sec-arrow">›</span>
        <span class="sec-label-wrap">
          <div class="sec-name">${ds.sector}</div>
          <div class="sec-ver">${ds.version} &nbsp;·&nbsp; ${ds.total_positions} vị trí</div>
        </span>
        <span class="sec-badge">${ds.total_skills}</span>
      </button>
      <div class="tree-sector-body" id="sbody-${si}">
        ${Object.entries(ngheMap).map(([nghe, posList]) => {
          const ngheId = 'nghe_' + si + '_' + nghe.replace(/\W/g,'_');
          return `
          <div class="tree-nghe">
            <button class="tree-nghe-hdr" id="${ngheId}_hdr"
              onclick="toggleNghe('${ngheId}')">
              <span class="nghe-arrow">›</span>
              <span class="nghe-name">${nghe}</span>
              <span class="nghe-cnt">${posList.length}</span>
            </button>
            <div class="tree-nghe-body" id="${ngheId}_body">
              ${posList.map(p => `
              <button class="tree-vt-btn"
                data-si="${si}" data-id="${esc(p.vi_tri)}"
                onclick="selectVT(${si}, '${esc(p.vi_tri)}', this)">
                <span class="vt-dot"></span>
                <span class="vt-name">${p.vi_tri}</span>
              </button>`).join('')}
            </div>
          </div>`;
        }).join('')}
      </div>`;

    tree.appendChild(secEl);
  });
}

function toggleSector(si) {
  const hdr  = document.getElementById('shdr-' + si);
  const body = document.getElementById('sbody-' + si);
  const open = body.classList.toggle('open');
  hdr.classList.toggle('open', open);
  hdr.classList.toggle('active-branch', open);
}

function toggleNghe(ngheId) {
  const hdr  = document.getElementById(ngheId + '_hdr');
  const body = document.getElementById(ngheId + '_body');
  const open = body.classList.toggle('open');
  hdr.classList.toggle('open', open);
  hdr.classList.toggle('active-branch', open);
}

function openPathTo(si, viTri) {
  // Open sector
  const shdr  = document.getElementById('shdr-' + si);
  const sbody = document.getElementById('sbody-' + si);
  if (!sbody.classList.contains('open')) {
    sbody.classList.add('open');
    shdr.classList.add('open', 'active-branch');
  }
  // Find the nghe that contains this vi_tri
  const pos = DATASETS[si].positions.find(p => p.vi_tri === viTri);
  if (!pos) return;
  const ngheId = 'nghe_' + si + '_' + pos.nghe.replace(/\W/g,'_');
  const nhdr  = document.getElementById(ngheId + '_hdr');
  const nbody = document.getElementById(ngheId + '_body');
  if (nhdr && nbody && !nbody.classList.contains('open')) {
    nbody.classList.add('open');
    nhdr.classList.add('open', 'active-branch');
  }
}

  currentVT = null;

function renderLanding() {
  // Global totals
  const totalSectors   = DATASETS.length;
  const totalPositions = DATASETS.reduce((a,d) => a + (d.total_positions||0), 0);
  const totalSkills    = DATASETS.reduce((a,d) => a + (d.total_skills||0), 0);
  const totalVN        = DATASETS.reduce((a,d) => {
    const flags = d.iviec_flags||{};
    return a + Object.values(flags).reduce((x,v)=>x+v,0);
  }, 0);

  const summaries = [
    { n: totalSectors,   l: 'Nhóm nghề',   s: 'Sectors', hi: false },
    { n: totalPositions, l: 'Vị trí',       s: 'Công việc', hi: true },
    { n: totalSkills,    l: 'Kĩ năng',      s: 'Tổng cộng', hi: false },
    { n: totalVN,        l: 'Đặc thù VN',   s: 'iViec flags', hi: false },
  ];

  document.getElementById('landing').innerHTML = `
    <div class="land-header">
      <div class="land-eyebrow">Skill Taxonomy · v1 · 04/03/2026</div>
      <h1 class="land-title">Phân loại<br>kĩ năng nghề</h1>

    </div>

    <div class="sum-grid">
      ${summaries.map(c => `
        <div class="sum-card ${c.hi?'hi':''}">
          <div class="s-num">${c.n}</div>
          <div class="s-lbl">${c.l}</div>
          <div class="s-sub">${c.s}</div>
        </div>`).join('')}
    </div>

    <div class="dist-block">
      <div class="dist-hdr">Các nhóm nghề</div>
      <div class="sector-chips">
        ${DATASETS.map((d, si) => `
          <div class="sector-chip" onclick="expandSector(${si})">
            <div>
              <div class="sc-name">${d.sector}</div>
              <div class="sc-stats">${d.total_positions} vị trí · ${d.total_skills} kĩ năng</div>
            </div>
            <span class="sc-ver">${d.version}</span>
          </div>`).join('')}
      </div>

}

function expandSector(si) {
  // Open that sector in sidebar and scroll to it
  const shdr  = document.getElementById('shdr-' + si);
  const sbody = document.getElementById('sbody-' + si);
  sbody.classList.add('open');

  shdr.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ────────────────────────────────────────────────────────────────
   SELECT POSITION
──────────────────────────────────────────────────────────────── */
function selectVT(si, viTri, btnEl) {
  // Clear search
  document.getElementById('srch').value = '';
  searchQ = '';
  document.getElementById('srch-cnt').textContent = '';

  // Update nav state
  document.querySelectorAll('.tree-vt-btn').forEach(b => b.classList.remove('active'));
  if (btnEl) btnEl.classList.add('active');

  activeSectorIdx = si;
  currentVT = { si, viTri };

  openPathTo(si, viTri);
  clearMainViews();

  const ds  = DATASETS[si];
  const pos = ds.positions.find(p => p.vi_tri === viTri);
  if (!pos) return;

  const id  = 'pd_' + si + '_' + viTri.replace(/\W/g,'_');
  let det   = document.getElementById(id);
  if (!det) {
    det = buildPosDetail(si, pos, id);
    document.getElementById('pos-ct').appendChild(det);
  }
  det.classList.add('active');
  window.scrollTo(0, 0);
}

/* ────────────────────────────────────────────────────────────────
   BUILD POSITION DETAIL
──────────────────────────────────────────────────────────────── */
function buildPosDetail(si, pos, id) {
  const skills = pos.skills || [];
  const tg = {}; // type → skills[]
  const rg = { required: [], preferred: [] };
  const tc = {}; // type → count
  skills.forEach(s => {
    const t = s.skill_type||'other';
    (tg[t]||(tg[t]=[])).push(s);
    (s.requirement==='required' ? rg.required : rg.preferred).push(s);
    tc[t] = (tc[t]||0)+1;
  });
  const vnSk = skills.filter(s => s.iviec_flag);
  const ds   = DATASETS[si];

  const el = document.createElement('div');
  el.className = 'pos-det'; el.id = id;

  el.innerHTML = `
    <div class="pos-hdr">
      <div class="pos-bc">
        <span>${ds.sector}</span><span class="sep">›</span>
        <span>${pos.nghe}</span>
      </div>
      <div class="pos-title">${pos.vi_tri}</div>
      <div class="pos-chips">
        <span class="pchip tot">${skills.length} kĩ năng</span>
        <span class="pchip">Bắt buộc: ${rg.required.length}</span>
        <span class="pchip">Ưu tiên: ${rg.preferred.length}</span>
        ${vnSk.length ? `<span class="pchip vn">Đặc thù VN: ${vnSk.length}</span>` : ''}
      </div>
    </div>

    <div class="frow" id="fr-${id}">
      <button class="ftab active" onclick="filterPos('${id}','all',this)">Tất cả <span class="cn">${skills.length}</span></button>
      <button class="ftab" onclick="filterPos('${id}','required',this)">Bắt buộc <span class="cn">${rg.required.length}</span></button>
      <button class="ftab" onclick="filterPos('${id}','preferred',this)">Ưu tiên <span class="cn">${rg.preferred.length}</span></button>
      ${vnSk.length ? `<button class="ftab" onclick="filterPos('${id}','vn',this)">Đặc thù VN <span class="cn">${vnSk.length}</span></button>` : ''}
      ${TYPE_ORDER.filter(t=>tg[t]).map(t =>
        `<button class="ftab" onclick="filterPos('${id}','${t}',this)">${TYPE_VI[t]||t} <span class="cn">${tc[t]}</span></button>`
      ).join('')}
    </div>

    <div id="sc-${id}">
      ${TYPE_ORDER.filter(t=>tg[t]).map(t => `
        <div class="sk-grp" data-type="${t}">
          <div class="sg-lbl">${TYPE_VI[t]||t} (${tg[t].length})</div>
          <div class="sk-grid">${tg[t].map(renderCard).join('')}</div>
        </div>`).join('')}
      ${tg.other ? `
        <div class="sk-grp" data-type="other">
          <div class="sg-lbl">Khác (${tg.other.length})</div>
          <div class="sk-grid">${tg.other.map(renderCard).join('')}</div>
        </div>` : ''}
    </div>`;
  return el;
}

function renderCard(s) {
  const req  = s.requirement || 'preferred';
  const type = s.skill_type  || 'other';
  const isVN = !!s.iviec_flag;
  const prof = s.proficiency_level && s.proficiency_level !== 'any' ? PROF_VI[s.proficiency_level]||s.proficiency_level : '';
  return `
    <div class="sk-card ${req}" data-req="${req}" data-type="${type}" data-vn="${isVN}">
      <div class="sk-nm">
        ${s.label_vi||s.label_en}
        ${isVN ? `<span class="vn-badge">${VN_SHORT[s.iviec_flag]||s.iviec_flag}</span>` : ''}
      </div>
      <div class="sk-tags">
        <span class="sk-tag req-${req}">${REQ_VI[req]||req}</span>
        <span class="sk-tag">${TYPE_VI[type]||type}</span>
        ${prof ? `<span class="sk-tag">${prof}</span>` : ''}
      </div>
      ${s.evidence_text ? `<div class="sk-ev">${s.evidence_text}</div>` : ''}
    </div>`;
}

function filterPos(posId, filter, btn) {
  document.querySelectorAll(`#fr-${posId} .ftab`).forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  const ct    = document.getElementById('sc-' + posId);
  const cards = ct.querySelectorAll('.sk-card');
  const grps  = ct.querySelectorAll('.sk-grp');
  if (filter === 'all') {
    cards.forEach(c => c.classList.remove('hidden'));
    grps.forEach(g  => g.classList.remove('hidden'));
    return;
  }
  cards.forEach(c => {
    const show = filter==='required'||filter==='preferred' ? c.dataset.req===filter
               : filter==='vn' ? c.dataset.vn==='true'
               : c.dataset.type===filter;
    c.classList.toggle('hidden', !show);
  });
  grps.forEach(g => g.classList.toggle('hidden',
    !g.querySelectorAll('.sk-card:not(.hidden)').length));
}

/* ────────────────────────────────────────────────────────────────
   SEARCH — searches across ALL sectors
──────────────────────────────────────────────────────────────── */
function handleSearch(val) {
  searchQ = val.trim().toLowerCase();
  document.getElementById('srch-cnt').textContent = '';

  if (!searchQ) {
    document.getElementById('sr-view').classList.remove('active');
    if (currentVT) {
      const id = 'pd_' + currentVT.si + '_' + currentVT.viTri.replace(/\W/g,'_');
      document.getElementById(id)?.classList.add('active');
    } else {
      showLanding();
    }
    return;
  }

  clearMainViews();
  const results = allSkillsFlat(null).filter(s =>
    (s.label_en||'').toLowerCase().includes(searchQ) ||
    (s.label_vi||'').toLowerCase().includes(searchQ)
  );
  document.getElementById('srch-cnt').textContent = results.length + ' kết quả';
  renderSearch(results);
}

function renderSearch(results) {
  const view = document.getElementById('sr-view');
  document.getElementById('sr-sub').textContent =
    `Tìm thấy ${results.length} kĩ năng trên ${DATASETS.length} sector`;
  view.classList.add('active');

  if (!results.length) {
    document.getElementById('sr-list').innerHTML =
      `<div class="no-res"><div class="ico">◇</div><p>Không tìm thấy kết quả.</p></div>`;
    return;
  }

  // Group by skill name
  const map = {};
  results.forEach(s => {
    const k = s.label_en||s.label_vi;
    if (!map[k]) map[k] = { vi: s.label_vi, en: s.label_en, type: s.skill_type, flag: s.iviec_flag, hits: [] };
    map[k].hits.push({ si: s._si, sector: s._sector, vt: s._pos.vi_tri, req: s.requirement });
  });

  document.getElementById('sr-list').innerHTML = Object.entries(map).map(([,it]) => `
    <div class="sri">
      <div class="sri-nm">${hl(it.vi||it.en)}</div>
      <div class="sri-en">${hl(it.en||'')}</div>
      <div class="sri-meta">
        ${it.hits.map(h => `
          <span class="sri-chip pos ${h.req==='required'?'req':''}"
            onclick="jumpToPos(${h.si},'${esc(h.vt)}')">
            ${h.sector} · ${h.vt}
          </span>`).join('')}
        <span class="sri-chip">${TYPE_VI[it.type]||it.type||''}</span>
        ${it.flag ? `<span class="sri-chip vn">${VN_SHORT[it.flag]||it.flag}</span>` : ''}
      </div>
    </div>`).join('');
}

function hl(text) {
  if (!text) return '';
  const re = new RegExp(`(${searchQ.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');
  return text.replace(re,'<mark style="background:var(--acc);color:var(--acc-i);border-radius:1px;padding:0 1px">$1</mark>');
}

function jumpToPos(si, viTri) {
  document.getElementById('srch').value = '';
  handleSearch('');
  openPathTo(si, viTri);
  const btn = document.querySelector(`.tree-vt-btn[data-si="${si}"][data-id="${viTri}"]`);
  selectVT(si, viTri, btn);
}

/* ────────────────────────────────────────────────────────────────
   UTILITIES
──────────────────────────────────────────────────────────────── */
function clearMainViews() {
  document.getElementById('landing').style.display = 'none';
  document.getElementById('sr-view').classList.remove('active');
  document.querySelectorAll('.pos-det').forEach(e => e.classList.remove('active'));
}

/* ────────────────────────────────────────────────────────────────
   INIT
──────────────────────────────────────────────────────────────── */
buildTree();
showLanding();
</script>
</body>
</html>
